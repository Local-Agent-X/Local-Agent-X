# Secret scanning false-positive excludes.
# Every "secret" flagged by GitHub's assessment is a synthetic bait string
# used by the security/classifier test suite — fake PEM bodies (MIIE...),
# placeholder Postgres URLs (user:secret@host/db), and fixture JWTs/keys.
# None are live credentials. These paths hold those fixtures on purpose.
paths-ignore:
  - "**/*.test.ts"
  - "**/__tests__/**"
  - "src/security-tests.ts"
  - "src/ari-kernel/benchmarks.ts"
  - "test/**"
