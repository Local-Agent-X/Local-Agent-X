# Build pre-bundled voice sidecar venvs as GitHub Release artifacts.
#
# Why this exists:
#   The naive "pip install at user-time" path is fragile — Windows Defender
#   silently deletes wheels mid-stream, upstream requirements drift, and a
#   non-tech user has no recovery path. Pre-built artifacts solve all of
#   that: AV scans the zip ONCE on download, install becomes "unzip", and
#   we ship verified known-good binaries instead of assembling them on
#   each user's box.
#
# What this builds:
#   chatterbox-venv-cu126-py311.zip   — Chatterbox sidecar (Studio)
#   lite-venv-cu126-py311.zip         — Lite voice sidecar (TTS+STT base)
#
# Each runs the matching install.ps1 from a CLEAN Windows runner, then
# zips the resulting venv. Generated artifacts are uploaded to the GitHub
# Release matching the tag that triggered the workflow.
#
# How users consume them:
#   The install.ps1 reads $env:LAX_*_VENV_ARTIFACT_URL or
#   ~/.lax/voice-bundles.json. If a URL is set, install becomes
#   download-and-extract instead of pip install. See install.ps1 for the
#   artifact-first path.
#
# Trigger:
#   - Manual via workflow_dispatch
#   - Release tag (v*-voice) so we don't rebuild artifacts on every commit
#     (these are big and CI minutes aren't free).
name: Build voice sidecar artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*-voice'

permissions:
  contents: read

jobs:
  build-lite:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run install.ps1 (Lite sidecar)
        shell: pwsh
        run: |
          ./python/voice/install.ps1
        env:
          LAX_FORCE_CPU_TORCH: '1'

      - name: Pack venv
        shell: pwsh
        run: |
          $venvDir = Join-Path $env:USERPROFILE ".lax\python-voice\venv"
          $out = "./lite-venv-cpu-py311.zip"
          Compress-Archive -Path "$venvDir\*" -DestinationPath $out -CompressionLevel Optimal
          $sha = (Get-FileHash $out -Algorithm SHA256).Hash
          "$sha *$(Split-Path $out -Leaf)" | Out-File -Encoding utf8 "$out.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: lite-venv-cpu-py311
          path: |
            lite-venv-cpu-py311.zip
            lite-venv-cpu-py311.zip.sha256

  build-chatterbox:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run install.ps1 (Chatterbox sidecar)
        shell: pwsh
        run: |
          ./python/chatterbox/install.ps1
        env:
          LAX_FORCE_CPU_TORCH: '1'

      - name: Pack venv
        shell: pwsh
        run: |
          $venvDir = Join-Path $env:USERPROFILE ".lax\python-chatterbox\venv"
          $out = "./chatterbox-venv-cpu-py311.zip"
          Compress-Archive -Path "$venvDir\*" -DestinationPath $out -CompressionLevel Optimal
          $sha = (Get-FileHash $out -Algorithm SHA256).Hash
          "$sha *$(Split-Path $out -Leaf)" | Out-File -Encoding utf8 "$out.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: chatterbox-venv-cpu-py311
          path: |
            chatterbox-venv-cpu-py311.zip
            chatterbox-venv-cpu-py311.zip.sha256

  publish-release:
    needs: [build-lite, build-chatterbox]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Upload to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: artifacts/**/*
          generate_release_notes: true
