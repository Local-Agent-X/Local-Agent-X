# Build pre-bundled voice sidecar venvs as GitHub Release artifacts.
#
# Why this exists:
#   The naive "pip install at user-time" path is fragile — Windows Defender
#   silently deletes wheels mid-stream, upstream requirements drift, and a
#   non-tech user has no recovery path. Pre-built artifacts solve all of
#   that: AV scans the zip ONCE on download, install becomes "unzip", and
#   we ship verified known-good binaries instead of assembling them on
#   each user's box.
#
# What this builds:
#   voxcpm-venv-cpu-py311.zip         — VoxCPM sidecar (Studio-Vox, primary)
#   chatterbox-venv-cu126-py311.zip   — Chatterbox sidecar (Studio, backup)
#   lite-venv-cu126-py311.zip         — Lite voice sidecar (TTS+STT base)
#
# Each runs the matching install.ps1 from a CLEAN Windows runner, then
# zips the resulting venv. Generated artifacts are uploaded to the GitHub
# Release matching the tag that triggered the workflow.
#
# How users consume them:
#   The install.ps1 reads $env:LAX_*_VENV_ARTIFACT_URL or
#   ~/.lax/voice-bundles.json. If a URL is set, install becomes
#   download-and-extract instead of pip install. See install.ps1 for the
#   artifact-first path.
#
# Trigger:
#   - Manual via workflow_dispatch
#   - Release tag (v*-voice) so we don't rebuild artifacts on every commit
#     (these are big and CI minutes aren't free).
name: Build voice sidecar artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*-voice'

permissions:
  contents: read

jobs:
  release-gate:
    runs-on: ubuntu-latest
    outputs:
      source_sha: ${{ steps.refs.outputs.source_sha }}
      tooling_sha: ${{ steps.refs.outputs.tooling_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve source revision
        id: source
        env:
          EVENT_SHA: ${{ github.sha }}
        run: |
          SOURCE_SHA=$(git rev-parse HEAD)
          EVENT_SOURCE_SHA=$(git rev-parse "$EVENT_SHA^{commit}")
          if [[ "$SOURCE_SHA" != "$EVENT_SOURCE_SHA" ]]; then
            echo "::error::Workflow source SHA mismatch: event=$EVENT_SOURCE_SHA resolved=$SOURCE_SHA"
            exit 1
          fi
          echo "source_sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"

      - name: Check out release tooling
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: .release-tools
          persist-credentials: false

      - name: Resolve immutable tooling revision
        id: refs
        env:
          SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
        run: |
          echo "source_sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"
          echo "tooling_sha=$(git -C .release-tools rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release publication gate
        env:
          TOOLING_SHA: ${{ steps.refs.outputs.tooling_sha }}
        run: node .release-tools/scripts/release-gate.mjs --source-root "$GITHUB_WORKSPACE" --tooling-revision "$TOOLING_SHA" --report release-gate-report.json

      - name: Upload release gate evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: voice-release-gate-${{ github.ref_name }}
          path: release-gate-report.json
          if-no-files-found: error

  build-lite:
    needs: release-gate
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-gate.outputs.source_sha }}
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run install.ps1 (Lite sidecar)
        shell: pwsh
        run: |
          ./python/voice/install.ps1
        env:
          LAX_FORCE_CPU_TORCH: '1'

      - name: Pack venv
        shell: pwsh
        run: |
          $venvDir = Join-Path $env:USERPROFILE ".lax\python-voice\venv"
          $out = "./lite-venv-cpu-py311.zip"
          Compress-Archive -Path "$venvDir\*" -DestinationPath $out -CompressionLevel Optimal
          $sha = (Get-FileHash $out -Algorithm SHA256).Hash
          "$sha *$(Split-Path $out -Leaf)" | Out-File -Encoding utf8 "$out.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: lite-venv-cpu-py311
          path: |
            lite-venv-cpu-py311.zip
            lite-venv-cpu-py311.zip.sha256

  build-chatterbox:
    needs: release-gate
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-gate.outputs.source_sha }}
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run install.ps1 (Chatterbox sidecar)
        shell: pwsh
        run: |
          ./python/chatterbox/install.ps1
        env:
          LAX_FORCE_CPU_TORCH: '1'

      - name: Pack venv
        shell: pwsh
        run: |
          $venvDir = Join-Path $env:USERPROFILE ".lax\python-chatterbox\venv"
          $out = "./chatterbox-venv-cpu-py311.zip"
          Compress-Archive -Path "$venvDir\*" -DestinationPath $out -CompressionLevel Optimal
          $sha = (Get-FileHash $out -Algorithm SHA256).Hash
          "$sha *$(Split-Path $out -Leaf)" | Out-File -Encoding utf8 "$out.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: chatterbox-venv-cpu-py311
          path: |
            chatterbox-venv-cpu-py311.zip
            chatterbox-venv-cpu-py311.zip.sha256

  build-voxcpm:
    needs: release-gate
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-gate.outputs.source_sha }}
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run install.ps1 (VoxCPM sidecar)
        shell: pwsh
        run: |
          ./python/voxcpm/install.ps1
        env:
          LAX_FORCE_CPU_TORCH: '1'

      - name: Pack venv
        shell: pwsh
        run: |
          $venvDir = Join-Path $env:USERPROFILE ".lax\python-voxcpm\venv"
          $out = "./voxcpm-venv-cpu-py311.zip"
          Compress-Archive -Path "$venvDir\*" -DestinationPath $out -CompressionLevel Optimal
          $sha = (Get-FileHash $out -Algorithm SHA256).Hash
          "$sha *$(Split-Path $out -Leaf)" | Out-File -Encoding utf8 "$out.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: voxcpm-venv-cpu-py311
          path: |
            voxcpm-venv-cpu-py311.zip
            voxcpm-venv-cpu-py311.zip.sha256

  publish-release:
    needs: [release-gate, build-lite, build-chatterbox, build-voxcpm]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Verify release tag is still immutable
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          EXPECTED_SOURCE_SHA: ${{ needs.release-gate.outputs.source_sha }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const expected = process.env.EXPECTED_SOURCE_SHA.toLowerCase();
            if (!/^v[0-9][0-9A-Za-z._-]*$/.test(tag) || !/^[a-f0-9]{40}$/.test(expected)) {
              throw new Error("Invalid release tag or qualified source SHA");
            }
            let object = (await github.rest.git.getRef({
              owner: context.repo.owner, repo: context.repo.repo, ref: `tags/${tag}`,
            })).data.object;
            const seen = new Set();
            while (object.type === "tag") {
              if (seen.has(object.sha) || seen.size >= 16) throw new Error("Cyclic or excessive annotated tag chain");
              seen.add(object.sha);
              object = (await github.rest.git.getTag({
                owner: context.repo.owner, repo: context.repo.repo, tag_sha: object.sha,
              })).data.object;
            }
            if (object.type !== "commit" || object.sha.toLowerCase() !== expected) {
              throw new Error(`Release tag moved: expected ${expected}, resolved ${object.type}:${object.sha}`);
            }

      - name: Upload to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: artifacts/**/*
          generate_release_notes: true
