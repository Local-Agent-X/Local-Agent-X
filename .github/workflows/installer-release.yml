name: Installer Release

# Builds the Windows .exe and macOS .app GUI installers on tag push and
# attaches both as assets to the GitHub Release the existing release.yml
# (source tarball) workflow already created for the same tag. The website's
# "Download for Windows / Mac" links point at these release assets, so
# tagging a new version is the entire publish flow.
#
# Release artifacts are signed before upload: Azure Artifact Signing for the
# Windows .exe, and Developer ID signing + Apple notarization for the macOS
# .dmg. Local `dotnet publish` / desktop packaging remains the unsigned
# development path and does not require release credentials.
#
# Required Windows GitHub Secrets:
#   AZURE_SIGN_TENANT_ID, AZURE_SIGN_CLIENT_ID, AZURE_SIGN_CLIENT_SECRET
#   AZURE_SIGN_ENDPOINT, AZURE_SIGN_ACCOUNT, AZURE_SIGN_CERT_PROFILE
# Required Windows GitHub Variable:
#   WIN_SIGN_EXPECTED_SUBJECT  exact Authenticode certificate subject
#
# Required macOS GitHub Secrets (see installer/mac-bundle/SIGNING.md):
#   MACOS_CERTIFICATE        base64 .p12 of Developer ID Application
#   MACOS_CERTIFICATE_PWD    password used when exporting the .p12
#   MACOS_KEYCHAIN_PWD       random string for the runner's temp keychain
#   MACOS_SIGN_IDENTITY      e.g. "Developer ID Application: Name (TEAM)"
#   MACOS_TEAM_ID            10-char Apple Team ID
#   MACOS_API_KEY_P8         base64 .p8 from App Store Connect (Developer role)
#   MACOS_API_KEY_ID         10-char Key ID
#   MACOS_API_ISSUER_ID      UUID issuer from App Store Connect
#
# Release URL pattern (public repo):
#   https://github.com/<owner>/<repo>/releases/latest/download/<asset>
#
# Trigger: push a tag matching v*  (e.g. `git tag v0.2.0 && git push --tags`).
# Manually re-run an existing version tag (lowercase v followed by a digit)
# via workflow_dispatch if a release needs to be rebuilt without moving it.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing version tag (lowercase v followed by a digit)"
        required: true
        type: string

permissions:
  contents: write   # softprops/action-gh-release needs write to attach assets

env:
  # Tag-push runs take the pushed tag; dispatch runs take the required input.
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  build-windows:
    name: Windows installer (.exe)
    runs-on: windows-latest
    env:
      AZURE_SIGN_TENANT_ID: ${{ secrets.AZURE_SIGN_TENANT_ID }}
      AZURE_SIGN_CLIENT_ID: ${{ secrets.AZURE_SIGN_CLIENT_ID }}
      AZURE_SIGN_CLIENT_SECRET: ${{ secrets.AZURE_SIGN_CLIENT_SECRET }}
      AZURE_SIGN_ENDPOINT: ${{ secrets.AZURE_SIGN_ENDPOINT }}
      AZURE_SIGN_ACCOUNT: ${{ secrets.AZURE_SIGN_ACCOUNT }}
      AZURE_SIGN_CERT_PROFILE: ${{ secrets.AZURE_SIGN_CERT_PROFILE }}
      WIN_SIGN_EXPECTED_SUBJECT: ${{ vars.WIN_SIGN_EXPECTED_SUBJECT }}
    steps:
      - name: Require a version tag
        shell: pwsh
        run: |
          if ($env:RELEASE_TAG -cnotmatch '^v\d') {
            Write-Error "Installer releases require a version tag beginning with v and a digit, got: $env:RELEASE_TAG"
            exit 1
          }

      - uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - name: Require Windows release signing configuration
        shell: pwsh
        run: |
          $required = [ordered]@{
            AZURE_SIGN_TENANT_ID = $env:AZURE_SIGN_TENANT_ID
            AZURE_SIGN_CLIENT_ID = $env:AZURE_SIGN_CLIENT_ID
            AZURE_SIGN_CLIENT_SECRET = $env:AZURE_SIGN_CLIENT_SECRET
            AZURE_SIGN_ENDPOINT = $env:AZURE_SIGN_ENDPOINT
            AZURE_SIGN_ACCOUNT = $env:AZURE_SIGN_ACCOUNT
            AZURE_SIGN_CERT_PROFILE = $env:AZURE_SIGN_CERT_PROFILE
            WIN_SIGN_EXPECTED_SUBJECT = $env:WIN_SIGN_EXPECTED_SUBJECT
          }
          $missing = @($required.GetEnumerator() | Where-Object {
            [string]::IsNullOrWhiteSpace([string]$_.Value)
          } | ForEach-Object Key)
          if ($missing.Count -gt 0) {
            Write-Error "Windows release signing configuration is incomplete: $($missing -join ', ')"
            exit 1
          }

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Stage bundled Electron runtime
        # Download the pinned Electron archive into installer/electron-bundle/ so
        # the publish below embeds it (Installer.csproj). The installed app then
        # extracts it offline instead of downloading the ~190 MB runtime — the #1
        # install failure. Verified against the release SHASUMS256 by the script.
        shell: pwsh
        run: node scripts/fetch-electron-bundle.mjs --platform win32 --arch x64

      - name: Publish single-file self-contained .exe
        # -p:InstallerSourceTag pins the source version this installer
        # downloads at runtime. RELEASE_TAG is the pushed tag or the explicit
        # existing tag selected for a manual rebuild.
        shell: pwsh
        run: |
          dotnet publish installer/Installer.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:PublishTrimmed=false `
            -p:InstallerSourceTag=$env:RELEASE_TAG `
            --nologo

      - name: Stage release artifact
        shell: pwsh
        run: |
          $src = "installer/bin/Release/net8.0/win-x64/publish/LocalAgentXInstaller.exe"
          $dst = "Install Local Agent X Windows Installer.exe"
          Copy-Item -LiteralPath $src -Destination $dst -Force
          Write-Host ("Size: {0:N1} MB" -f ((Get-Item -LiteralPath $dst).Length / 1MB))

      - name: Sign the installer (Azure Artifact Signing)
        uses: azure/artifact-signing-action@v2
        with:
          azure-tenant-id: ${{ secrets.AZURE_SIGN_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_SIGN_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_SIGN_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_SIGN_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGN_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_SIGN_CERT_PROFILE }}
          files: ${{ github.workspace }}\Install Local Agent X Windows Installer.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify signing identity (fail-closed on cert drift)
        # Artifact Signing rotates short-lived certificates, so pin the stable,
        # public certificate subject instead of a rotating thumbprint.
        shell: pwsh
        run: |
          $exe = "Install Local Agent X Windows Installer.exe"
          $sig = Get-AuthenticodeSignature -LiteralPath $exe
          if ($sig.Status -ne 'Valid') { Write-Error "Signature not Valid: $($sig.Status) - $($sig.StatusMessage)"; exit 1 }
          if ($null -eq $sig.TimeStamperCertificate) { Write-Error "Signature has no trusted timestamp - refusing to ship."; exit 1 }
          $subj = $sig.SignerCertificate.Subject
          $want = $env:WIN_SIGN_EXPECTED_SUBJECT
          if ($subj -cne $want) {
            Write-Error "Signing identity drift: subject [$subj] does not exactly match expected [$want] - refusing to ship."
            exit 1
          }
          Write-Host "Signing identity OK: $subj"

      - uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: "Install Local Agent X Windows Installer.exe"
          if-no-files-found: error

  build-macos:
    name: macOS installer (.dmg, signed + notarized)
    runs-on: macos-latest
    # KEYCHAIN_PATH is exported via $GITHUB_ENV in the first step below —
    # job-level `env` can't reference ${{ runner.* }}, only step-level can.
    env:
      DMG_PATH: installer/dist-mac/Install Local Agent X Mac Installer.dmg
      APP_PATH: installer/dist-mac/Install Local Agent X Mac Installer.app
    steps:
      - name: Require a version tag
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9] ]]; then
            echo "::error::Installer releases require a version tag beginning with v and a digit, got: $RELEASE_TAG"
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Import Developer ID certificate into temp keychain
        # Decodes the base64 .p12 stored in MACOS_CERTIFICATE into a temp
        # file, creates a throwaway keychain, imports the cert, and adds
        # the keychain to the user search list so codesign can find the
        # identity. The cleanup step at the bottom of the job removes the
        # keychain even on failure.
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_KEYCHAIN_PWD: ${{ secrets.MACOS_KEYCHAIN_PWD }}
        run: |
          KEYCHAIN_PATH="${RUNNER_TEMP}/build.keychain-db"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          CERT_PATH="${RUNNER_TEMP}/cert.p12"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$MACOS_KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PWD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$MACOS_KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')
          rm -f "$CERT_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Stage bundled Electron runtime
        # Embed the pinned Electron archive so the installed app extracts it
        # offline instead of downloading. macOS runners are arm64.
        run: node scripts/fetch-electron-bundle.mjs --platform darwin --arch arm64

      - name: Build + sign .app bundle
        env:
          INSTALLER_SOURCE_TAG: ${{ env.RELEASE_TAG }}
          APPLE_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          chmod +x scripts/build-mac-installer.sh
          ./scripts/build-mac-installer.sh

      - name: Verify signing identity (fail-closed on cert drift)
        # Notarization + in-app-update continuity depend on the Apple Team. If a
        # rebuild ever signs with a different Team/Developer ID, fail HERE — before
        # wasting a ~30-min notarization cycle. Pin repo VARIABLE MAC_EXPECTED_TEAM_ID
        # (the 10-char Team ID is public — it's in every shipped binary). Skips
        # when the var is unset (non-breaking until you set it).
        if: ${{ vars.MAC_EXPECTED_TEAM_ID != '' }}
        run: |
          set -euo pipefail
          GOT=$(codesign -dvv "$APP_PATH" 2>&1 | sed -n 's/^TeamIdentifier=//p')
          WANT="${{ vars.MAC_EXPECTED_TEAM_ID }}"
          if [ "$GOT" != "$WANT" ]; then
            echo "::error::Signing identity drift: TeamIdentifier=$GOT, expected $WANT. A Team/cert swap breaks notarization + update continuity - refusing to ship."
            exit 1
          fi
          echo "Signing identity OK: TeamIdentifier=$GOT"

      - name: Reclaim disk space before .dmg packaging
        # macos-latest runners ship with multiple Xcode versions + iOS
        # simulators (~10GB combined). hdiutil's scratch volume needs
        # ~2x the source size and was hitting "No space left on device"
        # on the first attempt. We only need xcrun/notarytool from the
        # active Xcode; everything else here is dead weight for this job.
        run: |
          echo "=== before cleanup ==="
          df -h /
          sudo rm -rf ~/Library/Developer/CoreSimulator || true
          sudo rm -rf /Library/Developer/CoreSimulator || true
          # Keep only the active Xcode that xcode-select points at.
          ACTIVE_XCODE="$(xcode-select -p 2>/dev/null | sed -E 's|/Contents/Developer$||')"
          for x in /Applications/Xcode_*.app; do
            if [ "$x" != "$ACTIVE_XCODE" ]; then
              echo "removing $x"
              sudo rm -rf "$x" || true
            fi
          done
          # .NET publish intermediates are now duplicated inside the .app.
          rm -rf installer/bin installer/obj || true
          echo "=== after cleanup ==="
          df -h /

      - name: Package .app into .dmg
        # hdiutil ships with macOS; no extra deps. UDZO = compressed
        # read-only, the standard distribution format.
        #
        # NOT the one-shot `-srcfolder ... -format UDZO`: that auto-sizes the
        # intermediate read/write image to the exact content size with zero
        # padding, then fails with "No space left on device" while copying the
        # .app *into the freshly-mounted volume* — even with 100+GB free on the
        # host disk (the image is too small, not the runner). Build explicitly:
        # create a padded read/write image, ditto the .app in, detach, then
        # convert to the compressed read-only UDZO we ship.
        run: |
          set -euo pipefail
          VOL="Local Agent X"
          RW_DMG="${RUNNER_TEMP}/lax-installer-rw.dmg"
          MOUNT_DIR="${RUNNER_TEMP}/lax-installer-mnt"
          APP_MB=$(du -sm "$APP_PATH" | awk '{print $1}')
          SIZE_MB=$(( APP_MB + 200 ))   # generous padding for FS overhead
          echo "app=${APP_MB}MB -> image=${SIZE_MB}MB"

          # Empty read/write image (omit -format → defaults to UDRW).
          hdiutil create -volname "$VOL" -fs HFS+ \
            -size "${SIZE_MB}m" -ov "$RW_DMG"

          mkdir -p "$MOUNT_DIR"
          hdiutil attach "$RW_DMG" -mountpoint "$MOUNT_DIR" -nobrowse
          ditto "$APP_PATH" "$MOUNT_DIR/$(basename "$APP_PATH")"
          # Brand the mounted volume with the LAX icon. .VolumeIcon.icns lives
          # inside the image filesystem, so it survives signing, notarization,
          # and HTTP download — unlike a custom icon on the .dmg *file*, which
          # is stored in an extended attribute GitHub strips on download.
          cp installer/mac-bundle/icon.icns "$MOUNT_DIR/.VolumeIcon.icns"
          SetFile -c icnC "$MOUNT_DIR/.VolumeIcon.icns" || true
          SetFile -a C "$MOUNT_DIR" || true
          hdiutil detach "$MOUNT_DIR"

          hdiutil convert "$RW_DMG" -format UDZO -ov -o "$DMG_PATH"
          rm -f "$RW_DMG"
          ls -la installer/dist-mac

      - name: Sign the .dmg
        # The .app inside is already hardened-runtime signed by the build
        # script. The outer .dmg also needs a signature so notarization
        # accepts it and stapler can attach the ticket.
        env:
          APPLE_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          codesign --force --sign "$APPLE_SIGN_IDENTITY" --timestamp "$DMG_PATH"
          codesign --verify --verbose=2 "$DMG_PATH"

      - name: Notarize .dmg with notarytool
        # Resilient notarization: submit returns immediately with a
        # submission ID, then we poll `notarytool info` in a shell loop
        # with sleep 30s between polls. A single network hiccup during
        # one poll cycle is a 30s pause and a retry — not a 50-min loss.
        # (The previous `notarytool submit --wait` form held one long-
        # lived HTTP poll inside notarytool itself, and a single
        # NSURLError -1009 from the runner killed the whole step after
        # ~50 min of waiting.)
        id: notarize
        env:
          MACOS_API_KEY_P8: ${{ secrets.MACOS_API_KEY_P8 }}
          MACOS_API_KEY_ID: ${{ secrets.MACOS_API_KEY_ID }}
          MACOS_API_ISSUER_ID: ${{ secrets.MACOS_API_ISSUER_ID }}
        run: |
          set -u
          KEY_PATH="${RUNNER_TEMP}/AuthKey.p8"
          echo "$MACOS_API_KEY_P8" | base64 --decode > "$KEY_PATH"
          trap 'rm -f "$KEY_PATH"' EXIT

          # 1) Submit. Returns immediately with the submission ID.
          SUBMIT_JSON=$(xcrun notarytool submit "$DMG_PATH" \
            --key "$KEY_PATH" \
            --key-id "$MACOS_API_KEY_ID" \
            --issuer "$MACOS_API_ISSUER_ID" \
            --output-format json) || { echo "::error::notarytool submit failed"; exit 1; }
          echo "$SUBMIT_JSON"
          SUBMISSION_ID=$(echo "$SUBMIT_JSON" | jq -r '.id')
          echo "submission-id=$SUBMISSION_ID" >> "$GITHUB_OUTPUT"
          echo "::notice title=Notary submission::$SUBMISSION_ID — recoverable via 'xcrun notarytool info' if this step dies"

          # 2) Poll every 30s, tolerant of transient network errors.
          #    Apple's official guidance is "usually <1h"; we cap at 90 min.
          DEADLINE=$(( $(date -u +%s) + 5400 ))
          LAST_STATUS=""
          while [ "$(date -u +%s)" -lt "$DEADLINE" ]; do
            INFO_JSON=$(xcrun notarytool info "$SUBMISSION_ID" \
              --key "$KEY_PATH" \
              --key-id "$MACOS_API_KEY_ID" \
              --issuer "$MACOS_API_ISSUER_ID" \
              --output-format json 2>&1) || INFO_JSON=""
            STATUS=$(echo "$INFO_JSON" | jq -r '.status // empty' 2>/dev/null || echo "")
            if [ "$STATUS" != "$LAST_STATUS" ]; then
              echo "[$(date -u +%H:%M:%S)] notarize status: ${STATUS:-<network err, retrying>}"
              LAST_STATUS="$STATUS"
            fi
            case "$STATUS" in
              Accepted)
                echo "✅ Apple accepted submission $SUBMISSION_ID"
                exit 0
                ;;
              Invalid|Rejected)
                echo "::error::Apple rejected submission $SUBMISSION_ID with status=$STATUS"
                echo "=== notarytool log ==="
                xcrun notarytool log "$SUBMISSION_ID" \
                  --key "$KEY_PATH" \
                  --key-id "$MACOS_API_KEY_ID" \
                  --issuer "$MACOS_API_ISSUER_ID" || true
                exit 1
                ;;
            esac
            sleep 30
          done
          echo "::error::Timed out after 90 min. Submission ID: $SUBMISSION_ID"
          echo "Manual re-query: xcrun notarytool info $SUBMISSION_ID --key <p8> --key-id $MACOS_API_KEY_ID --issuer <issuer>"
          exit 1

      - name: Staple notarization ticket to .dmg
        # Embeds the ticket in the .dmg so Gatekeeper can verify offline
        # (without this, first-launch on a machine that has never seen
        # this build still requires an Apple network round-trip).
        run: xcrun stapler staple "$DMG_PATH"

      - name: Verify Gatekeeper assessment
        # spctl --assess simulates what macOS does when a user double-
        # clicks the .dmg. Expect: "accepted source=Notarized Developer ID".
        run: |
          spctl --assess --type open --context context:primary-signature \
            --verbose=2 "$DMG_PATH"

      - name: Delete temp keychain
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

      - uses: actions/upload-artifact@v7
        with:
          name: macos-installer
          path: "installer/dist-mac/Install Local Agent X Mac Installer.dmg"
          if-no-files-found: error

  attach-to-release:
    name: Attach to GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: List downloaded artifacts
        run: |
          find dist -type f | sort

      - name: Attach to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          # The companion release.yml workflow already creates the release
          # with the source tarball and generated release notes; this run
          # appends the two installer binaries to that same release.
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: false
          draft: false
          prerelease: false
          # Pinned version releases never take the "Latest" badge — the rolling
          # release is the featured Latest download (see release.yml note).
          make_latest: false
          fail_on_unmatched_files: true
          files: |
            dist/windows-installer/Install Local Agent X Windows Installer.exe
            dist/macos-installer/Install Local Agent X Mac Installer.dmg
