name: Release

on:
  push:
    tags:
      - 'v*' # Triggered by version tags: v0.2.0, v0.3.0, etc.
  # Re-release an EXISTING tag whose original run failed (e.g. a gate fixed
  # after tagging) without moving the tag — version tags are immutable here.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing v* tag to (re)release"
        required: true
        type: string

permissions:
  contents: write # Needed to create GitHub releases

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    env:
      # Tag-push runs take the pushed tag; dispatch runs take the input.
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - name: Require a version tag
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9] ]]; then
            echo "::error::Releases require a version tag beginning with v and a digit, got: $RELEASE_TAG"
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}

      # Historical tags predate the current release helper. Keep the tagged
      # source at the workspace root, and load tooling from this workflow's
      # commit into an untracked nested checkout.
      - name: Check out release tooling
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          path: .release-tools

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security check
        run: npm audit --production --audit-level=high

      - name: Run tests
        # test:unit is the CI-runnable vitest suite (the same one Security & CI
        # gates on). `npm test` is the LIVE integration suite — it needs a
        # running server and ~/.lax/config.json, which a clean runner never has.
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Package release
        run: |
          VERSION=${RELEASE_TAG#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          node .release-tools/scripts/build-source-archive.mjs "$RELEASE_TAG" "local-agent-x-${VERSION}.tar.gz" "local-agent-x-${VERSION}"

      - name: Generate checksums
        # Hashes the SAME local-agent-x-*.tar.gz asset uploaded below, so the
        # advertised `sha256sum -c checksums-sha256.txt` manual verification is
        # real. Note: there is no in-app auto-verify to keep this asset name in
        # sync with — the dead OTAManager.checkForUpdates/downloadUpdate release
        # path was removed (R4-07), since the app updates via the rolling
        # commit-pinned channel, not these v* source tarballs.
        run: |
          sha256sum local-agent-x-*.tar.gz > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            local-agent-x-*.tar.gz
            checksums-sha256.txt
          body: |
            ## Local Agent X ${{ env.VERSION }}

            ### Security
            - SHA-256 checksums included for integrity verification
            - All security checks passed before release
            - Run `sha256sum -c checksums-sha256.txt` to verify

            ### Install
            ```bash
            tar -xzf local-agent-x-${{ env.VERSION }}.tar.gz
            cd local-agent-x-${{ env.VERSION }}
            npm ci
            npm run dev
            ```
          draft: false
          prerelease: false
          # Version tags are pinned/archived snapshots — they must NOT take the
          # "Latest" badge. The `rolling` release (installer-rolling.yml) is the
          # featured Latest download so new users always get the main-tracking,
          # auto-latest installer instead of a frozen version.
          make_latest: false
