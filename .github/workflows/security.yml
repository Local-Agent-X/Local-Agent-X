name: Security & CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run weekly on Monday at 9am UTC (catches new CVEs in dependencies)
    - cron: '0 9 * * 1'

permissions:
  contents: read

jobs:
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (production deps)
        run: npm audit --production --audit-level=high
        continue-on-error: true

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          FOUND=0
          # API keys, tokens, passwords in source
          if grep -rniP '(password|secret|api_key|apikey|private_key)\s*[=:]\s*["\x27][a-zA-Z0-9]{16,}' src/ public/ --include="*.ts" --include="*.js" 2>/dev/null | grep -v 'test\|example\|placeholder\|schema\|type\|interface\|description\|pattern\|regex'; then
            echo "::warning::Potential hardcoded secrets found"
            FOUND=1
          fi
          # AWS keys
          if grep -rn 'AKIA[A-Z0-9]{16}' src/ public/ 2>/dev/null; then
            echo "::error::AWS access key found in source"
            FOUND=1
          fi
          # GitHub tokens
          if grep -rnP 'gh[ps]_[a-zA-Z0-9]{36}' src/ public/ 2>/dev/null; then
            echo "::error::GitHub token found in source"
            FOUND=1
          fi
          if [ "$FOUND" -eq 0 ]; then echo "No secrets found"; fi

      - name: Verify security files exist
        run: |
          for f in src/security/index.ts src/sanitize.ts src/threat/threat-engine.ts src/keychain.ts SECURITY.md THREAT-MODEL.md; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing critical security file: $f"
              exit 1
            fi
          done
          echo "All security files present"

      - name: Verify lockfile integrity
        run: |
          if [ ! -f "package-lock.json" ]; then
            echo "::error::No package-lock.json — dependency confusion risk"
            exit 1
          fi
          echo "Lockfile present"

  test:
    name: Unit tests
    strategy:
      fail-fast: false
      matrix:
        # LAX is Windows-primary with native deps; several invariants
        # (DPAPI keychain, symlink containment, path resolution) only
        # diverge off Linux, so the gate must validate both.
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (vitest)
        if: matrix.os == 'windows-latest'
        run: npm run test:unit

      - name: Unit tests + coverage floor (vitest)
        if: matrix.os == 'ubuntu-latest'
        run: npm run test:coverage

      - name: Replay regression check
        run: npm run test:replay

  integration:
    name: Integration (API harness)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Boot server + run API harness
        env:
          LAX_DATA_DIR: ${{ runner.temp }}/lax-it
          LAX_SANDBOX: disabled
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          mkdir -p "$LAX_DATA_DIR"
          npm run dev:nowatch > /tmp/lax-server.log 2>&1 &
          SERVER_PID=$!
          READY=0
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:7007/api/health > /dev/null 2>&1 && [ -f "$LAX_DATA_DIR/config.json" ]; then
              echo "server ready after $((i * 2))s"; READY=1; break
            fi
            if ! kill -0 "$SERVER_PID" 2>/dev/null; then echo "server exited during boot"; break; fi
            sleep 2
          done
          if [ "$READY" != "1" ]; then
            echo "server never became ready"; cat /tmp/lax-server.log; exit 1
          fi
          npm test
          STATUS=$?
          kill "$SERVER_PID" 2>/dev/null || true
          exit $STATUS

      - name: Server log on failure
        if: failure()
        run: cat /tmp/lax-server.log || true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [security, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30
