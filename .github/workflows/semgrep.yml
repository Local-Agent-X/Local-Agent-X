name: Semgrep SAST

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Semgrep
        run: pip install semgrep

      # Findings print to the job log. Informational for now — without
      # `--error` Semgrep exits 0 on findings, so this won't red-wall main on
      # a first-run backlog. SARIF upload to the Security tab needs GitHub
      # Advanced Security, which this private repo doesn't have; flip to
      # `--error` (and add SARIF upload if GHAS is enabled) once triaged.
      - name: Scan
        run: >
          semgrep scan
          --config p/typescript
          --config p/security-audit
          --config p/nodejs
          --config p/owasp-top-ten
