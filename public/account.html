<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Connect agentxos account · Local Agent X</title>
    <!-- Apply the app's saved theme (dark/light/system) BEFORE paint, so this popup matches
         Local Agent X instead of forcing dark. Same origin → it reads the same lax_theme. -->
    <script src="/js/shared-theme.js?v=v2"></script>
    <style>
      /* Design tokens copied verbatim from public/css/app.css so the popup matches LAX
         and follows its light/dark toggle (shared-theme.js sets <html data-theme>). */
      :root {
        --bg: #0a0a0f; --surface: #0f0f18; --surface-2: #131325;
        --border: #1a1a2e; --accent: #40f0f0; --accent-dim: #30cccc88;
        --danger: #ff3333; --text: #c8d0e0; --muted: #666680; --hover: #151528;
        --font: 'Segoe UI', system-ui, sans-serif;
        --mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      }
      [data-theme="light"] {
        --bg: #f5f5f7; --surface: #ffffff; --surface-2: #f0f0f5;
        --border: #d8d8e0; --accent: #0066cc; --accent-dim: #0066cc44;
        --danger: #dc3545; --text: #1a1a2e; --muted: #7777aa; --hover: #eeeef4;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        font: 15px/1.5 var(--font);
        background: var(--bg); color: var(--text); padding: 32px;
      }
      .card {
        width: 100%; max-width: 460px; background: var(--surface); border: 1px solid var(--border);
        border-radius: 12px; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,.4);
      }
      .eyebrow { font-family: var(--mono); font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: var(--accent); margin: 0 0 10px; }
      h1 { font-size: 24px; margin: 0 0 8px; }
      p { color: var(--muted); margin: 0 0 18px; }
      /* Match LAX buttons: 8px radius, mono, transparent + accent border, fill on hover. */
      .btn {
        appearance: none; font-family: var(--mono); border-radius: 8px; padding: 8px 16px;
        font-size: 13px; font-weight: 600; line-height: 1.2; text-decoration: none; display: inline-block;
        background: transparent; border: 1px solid var(--accent); color: var(--accent);
        cursor: pointer; transition: all .2s;
      }
      .btn:hover { background: var(--accent); color: var(--bg); box-shadow: 0 0 12px var(--accent-dim); }
      .btn:disabled { opacity: .5; cursor: default; box-shadow: none; background: transparent; color: var(--accent); }
      .btn.ghost { border-color: var(--border); color: var(--muted); }
      .btn.ghost:hover { background: var(--hover); color: var(--text); border-color: var(--muted); box-shadow: none; }
      .btn.danger { border-color: var(--danger); color: var(--danger); }
      .btn.danger:hover { background: var(--danger); color: var(--bg); box-shadow: none; }
      .code { font-family: var(--mono); font-size: 34px; letter-spacing: .22em; font-weight: 800; text-align: center; margin: 14px 0; color: var(--text); font-variant-numeric: tabular-nums; }
      .qr { display: block; margin: 6px auto 14px; width: 240px; height: 240px; border-radius: 12px; background: #fff; padding: 10px; }
      a { color: var(--accent); }
      .err { color: var(--danger); font-size: 13px; margin-top: 12px; }
      .ok { color: #2aa84a; font-weight: 700; }
      .muted { font-size: 13px; color: var(--muted); }
      .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    </style>
  </head>
  <body>
    <div class="card" id="card">
      <p class="eyebrow">agentxos account</p>
      <div id="body"><p>Loading…</p></div>
      <div class="err" id="err" hidden></div>
    </div>

    <script>
      const token = new URLSearchParams(location.search).get("token") || "";
      const bodyEl = document.getElementById("body");
      const errEl = document.getElementById("err");

      async function api(path, method = "GET") {
        const res = await fetch(path, { method, headers: { Authorization: "Bearer " + token } });
        return res.ok ? res.json().catch(() => ({})) : Promise.reject(new Error("HTTP " + res.status));
      }
      const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

      let busy = false;
      // Auto-close ONLY when a freshly-shown QR gets scanned: we displayed the pairing QR
      // (s.pairing) this session, then it flipped to paired. So it never closes while the
      // QR is still up (you get the full time to scan), and never when the popup is opened
      // already-connected. `autoClosing` guards the 2s poll from re-arming the timer.
      let sawPairing = false;
      let autoClosing = false;
      let closeTimer = null;        // the pending auto-close, so Disconnect can cancel it
      let confirmingUnpair = false; // two-step guard on the destructive Disconnect action
      async function trigger(path) {
        if (busy) return;
        busy = true;
        try { await api(path, "POST"); } catch (e) { showErr(e.message); } finally { busy = false; render(await safeStatus()); }
      }
      function showErr(m) { errEl.hidden = !m; errEl.textContent = m || ""; }
      async function safeStatus() { try { return await api("/api/account/status"); } catch (e) { showErr(e.message); return null; } }

      function render(s) {
        if (!s) return;
        showErr(s.error);
        // 1) paired → done. Done closes now; a fresh QR-scan pair auto-closes 2s later.
        //    "Disconnect phone" REVOKES the server-side pairing (sign-out alone leaves it
        //    live, which is why a re-login re-adopts it) — confirm-gated, it's permanent.
        if (s.paired) {
          const justPaired = sawPairing && !autoClosing;
          const unpairUi = confirmingUnpair
            ? '<p class="muted" style="margin-top:16px">Disconnect this phone? It must scan a new QR to reconnect.</p>' +
              '<div class="row"><button class="btn danger" id="unpairYes">Disconnect</button>' +
              '<button class="btn ghost" id="unpairNo">Cancel</button></div>'
            : '<div class="row" style="margin-top:16px"><button class="btn ghost" id="unpair">Disconnect phone</button></div>';
          bodyEl.innerHTML =
            '<h1><span class="ok">✓ Connected</span></h1>' +
            "<p>This Mac is paired with your phone and reachable through the agentxos broker." +
            (justPaired ? " Closing this window…" : " You can close this window.") + "</p>" +
            '<div class="row"><button class="btn" id="done">Done</button>' +
            '<button class="btn ghost" id="out">Sign out</button></div>' +
            unpairUi;
          document.getElementById("done").onclick = () => window.close();
          document.getElementById("out").onclick = () => trigger("/api/account/signout");
          if (confirmingUnpair) {
            document.getElementById("unpairYes").onclick = () => { confirmingUnpair = false; sawPairing = false; trigger("/api/account/pair/unpair"); };
            document.getElementById("unpairNo").onclick = () => { confirmingUnpair = false; render(s); };
          } else {
            document.getElementById("unpair").onclick = () => {
              if (closeTimer) { clearTimeout(closeTimer); closeTimer = null; } // don't close mid-confirm
              confirmingUnpair = true; render(s);
            };
          }
          if (justPaired && !confirmingUnpair) { autoClosing = true; closeTimer = setTimeout(() => window.close(), 2000); }
          return;
        }
        // 2) pairing in flight → show QR. Mark that we've shown it, so ONLY the eventual
        //    transition to paired (the phone actually scanned) arms the auto-close.
        if (s.pairing) {
          sawPairing = true;
          const secsLeft = Math.max(0, Math.round((s.pairing.expiresAt - Date.now()) / 1000));
          bodyEl.innerHTML =
            "<h1>Scan to pair your phone</h1>" +
            "<p>Open the agentxos app on your phone and scan this code.</p>" +
            '<img class="qr" alt="Pairing QR" src="' + esc(s.pairing.qrDataUrl) + '" />' +
            '<p class="muted">Code expires in ' + secsLeft + "s. It refreshes automatically if it lapses.</p>";
          return;
        }
        // 3) signed in, not paired → offer to pair
        if (s.signedIn) {
          bodyEl.innerHTML =
            "<h1>Pair your phone</h1>" +
            "<p>Signed in as <strong>" + esc(s.email) + "</strong>. Show a one-time QR for your phone to scan.</p>" +
            '<div class="row"><button class="btn" id="pair">Show pairing QR</button>' +
            '<button class="btn ghost" id="out">Sign out</button></div>';
          document.getElementById("pair").onclick = () => trigger("/api/account/pair/start");
          document.getElementById("out").onclick = () => trigger("/api/account/signout");
          return;
        }
        // 4) login in flight → show the user code + approval link
        if (s.login) {
          bodyEl.innerHTML =
            "<h1>Approve this device</h1>" +
            "<p>On any signed-in browser, open the approval page and enter this code:</p>" +
            '<div class="code">' + esc(s.login.userCodeDisplay) + "</div>" +
            '<div class="row"><a class="btn" href="' + esc(s.login.verificationUriComplete) + '" target="_blank" rel="noopener">Open approval page ↗</a></div>' +
            '<p class="muted">' + esc(s.login.verificationUri) + "</p>";
          return;
        }
        // 5) signed out → start
        bodyEl.innerHTML =
          "<h1>Connect your agentxos account</h1>" +
          "<p>Sign in so your phone can reach this Mac through the agentxos broker.</p>" +
          '<div class="row"><button class="btn" id="in">Sign in</button></div>';
        document.getElementById("in").onclick = () => trigger("/api/account/login/start");
      }

      if (!token) {
        bodyEl.innerHTML = "<h1>Missing token</h1><p>Open this page from the Local Agent X menu.</p>";
      } else {
        (async () => { render(await safeStatus()); setInterval(async () => render(await safeStatus()), 2000); })();
      }
    </script>
  </body>
</html>
