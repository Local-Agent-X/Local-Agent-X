<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar — Open Agent X</title>
  <link rel="stylesheet" href="/css/theme.css">
  <style>
    body { background: var(--bg, #0a0a0a); color: var(--fg, #e0e0e0); font-family: var(--sans, system-ui, sans-serif); margin: 0; padding: 20px; }

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Calendar</title>
<style>
  body { margin: 0; padding: 24px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg, #0a0a0a); color: var(--fg, #eaeaea); }
  .wrap { max-width: 900px; margin: 0 auto; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  h1 { margin: 0; font-size: 24px; font-weight: 600; }
  .nav { display: flex; gap: 8px; align-items: center; }
  button { background: var(--panel, #1a1a1a); color: var(--fg, #eaeaea); border: 1px solid var(--border, #2a2a2a); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 14px; }
  button:hover { background: var(--accent, #3b82f6); color: white; border-color: var(--accent, #3b82f6); }
  .month-label { font-size: 18px; font-weight: 500; min-width: 180px; text-align: center; }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .dow { text-align: center; padding: 8px; font-size: 12px; text-transform: uppercase; color: var(--muted, #888); font-weight: 600; }
  .day { background: var(--panel, #1a1a1a); border: 1px solid var(--border, #2a2a2a); border-radius: 8px; padding: 10px; min-height: 90px; cursor: pointer; transition: all 0.15s; position: relative; }
  .day:hover { border-color: var(--accent, #3b82f6); }
  .day.empty { background: transparent; border: none; cursor: default; }
  .day.today { border-color: var(--accent, #3b82f6); background: rgba(59, 130, 246, 0.08); }
  .day-num { font-size: 14px; font-weight: 500; }
  .day.today .day-num { color: var(--accent, #3b82f6); font-weight: 700; }
  .event { background: var(--accent, #3b82f6); color: white; font-size: 11px; padding: 3px 6px; border-radius: 4px; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .panel { margin-top: 24px; background: var(--panel, #1a1a1a); border: 1px solid var(--border, #2a2a2a); border-radius: 10px; padding: 18px; }
  .panel h2 { margin: 0 0 12px 0; font-size: 16px; }
  .event-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border, #2a2a2a); font-size: 14px; }
  .event-row:last-child { border-bottom: none; }
  .event-row .title { font-weight: 500; }
  .event-row .time { color: var(--muted, #888); font-size: 13px; }
  .empty-msg { color: var(--muted, #888); font-size: 13px; padding: 8px 0; }
  form { display: grid; gap: 10px; margin-top: 12px; }
  input, textarea { background: var(--bg, #0a0a0a); color: var(--fg, #eaeaea); border: 1px solid var(--border, #2a2a2a); padding: 10px; border-radius: 6px; font-size: 14px; font-family: inherit; }
  input:focus, textarea:focus { outline: none; border-color: var(--accent, #3b82f6); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Calendar</h1>
    <div class="nav">
      <button onclick="prev()">◀</button>
      <div class="month-label" id="monthLabel"></div>
      <button onclick="next()">▶</button>
      <button onclick="today()">Today</button>
    </div>
  </header>

  <div class="grid" id="dows"></div>
  <div class="grid" id="days" style="margin-top:4px"></div>

  <div class="panel">
    <h2 id="selectedLabel">Events</h2>
    <div id="eventList"><div class="empty-msg">Loading…</div></div>
  </div>

  <div class="panel">
    <h2>Add Event</h2>
    <form onsubmit="addEvent(event)">
      <input id="evTitle" placeholder="Event title" required>
      <div class="row">
        <input id="evStart" type="datetime-local" required>
        <input id="evEnd" type="datetime-local" required>
      </div>
      <input id="evLocation" placeholder="Location (optional)">
      <textarea id="evDesc" placeholder="Description (optional)" rows="2"></textarea>
      <button type="submit">Create Event</button>
    </form>
  </div>
</div>

<script>
let current = new Date();
let selected = new Date();
let events = [];

const DOWS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function iso(d) { return d.toISOString().slice(0,10); }

async function loadEvents() {
  const y = current.getFullYear(), m = current.getMonth();
  const start = iso(new Date(y, m, 1));
  const end = iso(new Date(y, m + 1, 0));
  try {
    const _calToken = new URLSearchParams(window.location.search).get('token') || '';
    const r = await fetch(`/api/calendar/events?start=${start}&end=${end}`, { headers: _calToken ? { Authorization: 'Bearer ' + _calToken } : {} });
    if (r.ok) events = await r.json(); else events = [];
  } catch { events = []; }
  render();
}

function render() {
  const y = current.getFullYear(), m = current.getMonth();
  document.getElementById('monthLabel').textContent = `${MONTHS[m]} ${y}`;

  const dowsEl = document.getElementById('dows');
  dowsEl.innerHTML = DOWS.map(d => `<div class="dow">${d}</div>`).join('');

  const first = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const todayStr = iso(new Date());
  const selStr = iso(selected);

  let html = '';
  for (let i = 0; i < first; i++) html += '<div class="day empty"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = iso(new Date(y, m, d));
    const dayEvents = events.filter(e => (e.start || '').slice(0,10) === dateStr);
    const classes = ['day'];
    if (dateStr === todayStr) classes.push('today');
    html += `<div class="${classes.join(' ')}" onclick="selectDay('${dateStr}')">
      <div class="day-num">${d}</div>
      ${dayEvents.slice(0,2).map(e => `<div class="event">${escape(e.title)}</div>`).join('')}
      ${dayEvents.length > 2 ? `<div class="event" style="background:var(--muted,#888)">+${dayEvents.length - 2} more</div>` : ''}
    </div>`;
  }
  document.getElementById('days').innerHTML = html;

  const sel = events.filter(e => (e.start || '').slice(0,10) === selStr);
  document.getElementById('selectedLabel').textContent = `Events on ${selected.toLocaleDateString()}`;
  const list = document.getElementById('eventList');
  if (sel.length === 0) {
    list.innerHTML = '<div class="empty-msg">No events</div>';
  } else {
    list.innerHTML = sel.map(e => `
      <div class="event-row">
        <div><div class="title">${escape(e.title)}</div>${e.location ? `<div class="time">${escape(e.location)}</div>` : ''}</div>
        <div class="time">${formatTime(e.start)} – ${formatTime(e.end)}</div>
      </div>
    `).join('');
  }
}

function escape(s) { return String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function formatTime(iso) { if (!iso) return ''; return new Date(iso).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }); }
function selectDay(dateStr) { selected = new Date(dateStr + 'T00:00:00'); render(); }
function prev() { current = new Date(current.getFullYear(), current.getMonth() - 1, 1); loadEvents(); }
function next() { current = new Date(current.getFullYear(), current.getMonth() + 1, 1); loadEvents(); }
function today() { current = new Date(); selected = new Date(); loadEvents(); }

async function addEvent(e) {
  e.preventDefault();
  const body = {
    title: document.getElementById('evTitle').value,
    start: document.getElementById('evStart').value,
    end: document.getElementById('evEnd').value,
    location: document.getElementById('evLocation').value,
    description: document.getElementById('evDesc').value
  };
  try {
    const r = await fetch('/api/calendar/events', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (r.ok) {
      e.target.reset();
      loadEvents();
    } else {
      alert('Failed to create event');
    }
  } catch (err) { alert('Error: ' + err.message); }
}

loadEvents();
</script>
</body>
</html>
<script>
  // Expose API helper for custom pages
  const API = window.location.origin;
  const AUTH_TOKEN = localStorage.getItem('sax_token') || '';
  async function apiGet(path) {
    const r = await fetch(API + path, { headers: { Authorization: 'Bearer ' + AUTH_TOKEN } });
    return r.json();
  }
  async function apiPost(path, data) {
    const r = await fetch(API + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + AUTH_TOKEN },
      body: JSON.stringify(data)
    });
    return r.json();
  }
</script>
</body>
</html>
