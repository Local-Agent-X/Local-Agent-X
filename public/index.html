<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Secret Agent X</title>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #0f0f18;
  --border: #1a1a2e;
  --accent: #00ff41;
  --accent-dim: #00cc3388;
  --danger: #ff3333;
  --text: #c8d0e0;
  --muted: #555570;
  --user-bg: #0d1a2a;
  --agent-bg: #0f0f1a;
  --input-bg: #111122;
  --hover: #151528;
  --font: 'Segoe UI', system-ui, sans-serif;
  --mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}
body::after{content:'';position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,65,0.012) 2px,rgba(0,255,65,0.012) 4px);z-index:9999}

/* ── Sidebar ── */
#sidebar{width:280px;min-width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width .2s}
#sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
#logo{font-family:var(--mono);font-size:.85rem;color:var(--accent);letter-spacing:2px;text-transform:uppercase;text-shadow:0 0 10px var(--accent-dim);flex:1}
#new-chat-btn{background:transparent;border:1px solid var(--accent);color:var(--accent);border-radius:8px;padding:7px 12px;font-size:.75rem;cursor:pointer;font-family:var(--mono);transition:all .2s;white-space:nowrap}
#new-chat-btn:hover{background:var(--accent);color:var(--bg);box-shadow:0 0 12px var(--accent-dim)}

/* Projects */
#projects-section{padding:8px 0;border-bottom:1px solid var(--border)}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:0 12px;margin-bottom:4px}
.section-header span{font-size:.68rem;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.add-btn{background:none;border:none;color:var(--accent);cursor:pointer;font-size:.9rem;padding:2px 6px;border-radius:4px}
.add-btn:hover{background:var(--hover)}
.project-item{padding:6px 10px 6px 12px;cursor:pointer;font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:8px;transition:all .15s}
.project-item:hover{background:var(--hover);color:var(--text)}
.project-item.active{color:var(--accent)}
.project-arrow{font-size:.55rem;transition:transform .15s;width:10px;text-align:center;flex-shrink:0}
.project-item.expanded .project-arrow{transform:rotate(90deg)}
.project-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.project-count{font-size:.65rem;color:var(--muted);font-family:var(--mono)}
.project-delete{display:none;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.7rem;padding:2px 5px;border-radius:3px}
.project-item:hover .project-delete{display:block}
.project-delete:hover{color:var(--danger);background:#2a1010}
.project-chats{display:none;padding:2px 0 4px 20px}
.project-item.expanded+.project-chats{display:block}

/* Chat list */
#chats-section{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
#chats-header{padding:8px 12px 4px;font-size:.68rem;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:1px;flex-shrink:0}
#chat-list{flex:1;overflow-y:auto;padding:4px 8px;scrollbar-width:thin;scrollbar-color:#222 transparent}
.chat-item{padding:8px 10px;border-radius:8px;cursor:pointer;font-size:.78rem;color:var(--muted);transition:all .15s;margin-bottom:1px;display:flex;align-items:center;gap:8px;position:relative}
.chat-item:hover{background:var(--hover);color:var(--text)}
.chat-item.active{background:#1a1a30;color:var(--accent);border-left:2px solid var(--accent)}
.chat-dot{width:5px;height:5px;border-radius:50%;background:var(--accent-dim);flex-shrink:0}
.chat-item.active .chat-dot{background:var(--accent);box-shadow:0 0 6px var(--accent)}
.chat-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-actions{display:none;align-items:center;gap:2px}
.chat-item:hover .chat-actions{display:flex}
.chat-action-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.7rem;padding:2px 4px;border-radius:3px}
.chat-action-btn:hover{color:var(--text);background:var(--hover)}
.chat-action-btn.delete:hover{color:var(--danger);background:#2a1010}

/* Move-to-project dropdown */
.move-menu{position:absolute;right:0;top:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px;min-width:140px;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.5)}
.move-menu-item{padding:5px 10px;font-size:.72rem;color:var(--muted);cursor:pointer;border-radius:4px;font-family:var(--mono)}
.move-menu-item:hover{background:var(--hover);color:var(--text)}
.move-menu-item.remove{color:var(--danger)}

/* Utility bar */
#utility-bar{display:flex;border-top:1px solid var(--border);padding:6px 8px;gap:4px}
.util-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 4px;border-radius:8px;background:none;border:none;color:var(--muted);cursor:pointer;font-family:var(--mono);font-size:.68rem;text-decoration:none;transition:all .15s}
.util-btn:hover{background:var(--hover);color:var(--text)}
.util-btn .util-icon{font-size:.8rem}

#sidebar-footer{padding:10px 14px;border-top:1px solid var(--border);font-size:.68rem;font-family:var(--mono);display:flex;align-items:center;gap:6px}
#auth-dot{width:6px;height:6px;border-radius:50%;background:var(--danger)}
#auth-dot.ok{background:var(--accent);box-shadow:0 0 6px var(--accent-dim)}
#auth-label{color:var(--muted)}

/* ── Main ── */
#main{flex:1;display:flex;flex-direction:column;min-width:0}

/* Messages */
#messages{flex:1;overflow-y:auto;padding:24px 20px;display:flex;flex-direction:column;gap:16px;scrollbar-width:thin;scrollbar-color:#1a1a2e transparent}
.msg{max-width:800px;width:100%;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
.msg.user{align-self:flex-end}
.msg.assistant{align-self:flex-start}
.msg-label{font-size:.65rem;font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.msg.user .msg-label{color:#3388aa;text-align:right}
.msg.assistant .msg-label{color:var(--accent)}
.msg-body{padding:12px 16px;border-radius:12px;line-height:1.7;font-size:.9rem;white-space:pre-wrap;word-break:break-word}
.msg.user .msg-body{background:var(--user-bg);border:1px solid #1a2a40;border-radius:12px 12px 4px 12px}
.msg.assistant .msg-body{background:var(--agent-bg);border:1px solid var(--border);border-radius:12px 12px 12px 4px}

.tool-card{margin:8px 0;border-radius:8px;border:1px solid var(--border);overflow:hidden;font-size:.82rem}
.tool-header{padding:8px 12px;background:#111125;display:flex;align-items:center;gap:8px;cursor:pointer;font-family:var(--mono)}
.tool-header .indicator{width:8px;height:8px;border-radius:50%}
.tool-header .indicator.allowed{background:var(--accent);box-shadow:0 0 6px var(--accent-dim)}
.tool-header .indicator.blocked{background:var(--danger);box-shadow:0 0 6px rgba(255,51,51,.4)}
.tool-name{color:var(--accent)}
.tool-detail{display:none;padding:10px 12px;background:#0d0d18;font-family:var(--mono);font-size:.78rem;color:var(--muted);white-space:pre-wrap;max-height:200px;overflow-y:auto}
.tool-card.open .tool-detail{display:block}

.thinking{color:var(--muted);font-size:.85rem;padding:8px 0;font-family:var(--mono)}
.thinking span{animation:blink 1.2s infinite}
.thinking span:nth-child(2){animation-delay:.2s}
.thinking span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* Empty state */
#empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--muted)}
#empty h2{font-family:var(--mono);color:var(--accent);font-size:1.5rem;letter-spacing:3px;text-shadow:0 0 20px var(--accent-dim)}
#empty p{font-size:.85rem;max-width:400px;text-align:center;line-height:1.6}

/* Input area */
#input-area{padding:12px 20px 18px;border-top:1px solid var(--border)}
#input-box{background:var(--input-bg);border:1px solid var(--border);border-radius:14px;display:flex;align-items:flex-end;padding:10px 14px;transition:border-color .2s;max-width:800px;margin:0 auto;width:100%}
#input-box:focus-within{border-color:var(--accent);box-shadow:0 0 8px rgba(0,255,65,.1)}
#msg-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:.9rem;resize:none;max-height:160px;line-height:1.5;font-family:var(--font)}
#msg-input::placeholder{color:var(--muted)}
#send-btn{background:var(--accent);border:none;border-radius:8px;color:var(--bg);font-weight:700;padding:8px 18px;cursor:pointer;font-family:var(--mono);font-size:.8rem;margin-left:10px;transition:all .2s}
#send-btn:hover{box-shadow:0 0 14px var(--accent-dim)}
#send-btn:disabled{opacity:.3;cursor:not-allowed}

/* ── Secret Request Modal ── */
#secret-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:10000;align-items:center;justify-content:center}
#secret-modal-overlay.visible{display:flex}
#secret-modal{background:var(--surface);border:1px solid var(--accent);border-radius:16px;padding:28px 32px;max-width:480px;width:90%;box-shadow:0 0 40px rgba(0,255,65,.15);animation:fadeIn .2s ease}
#secret-modal h3{font-family:var(--mono);color:var(--accent);font-size:.95rem;margin-bottom:6px;letter-spacing:1px}
#secret-modal .secret-reason{color:var(--muted);font-size:.82rem;margin-bottom:16px;line-height:1.5}
#secret-modal .secret-name-badge{display:inline-block;background:#1a1a30;border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-family:var(--mono);font-size:.78rem;color:var(--accent);margin-bottom:12px}
#secret-modal .secret-service{color:var(--muted);font-size:.72rem;font-family:var(--mono);margin-bottom:12px}
#secret-input{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:var(--mono);font-size:.85rem;outline:none;transition:border-color .2s}
#secret-input:focus{border-color:var(--accent);box-shadow:0 0 8px rgba(0,255,65,.1)}
#secret-input::placeholder{color:var(--muted)}
.secret-modal-actions{display:flex;gap:10px;margin-top:16px;justify-content:flex-end}
.secret-modal-actions button{font-family:var(--mono);font-size:.78rem;padding:8px 18px;border-radius:8px;cursor:pointer;transition:all .2s}
#secret-cancel{background:transparent;border:1px solid var(--border);color:var(--muted)}
#secret-cancel:hover{border-color:var(--danger);color:var(--danger)}
#secret-submit{background:var(--accent);border:none;color:var(--bg);font-weight:700}
#secret-submit:hover{box-shadow:0 0 14px var(--accent-dim)}
#secret-submit:disabled{opacity:.3;cursor:not-allowed}
.secret-warning{font-size:.7rem;color:var(--muted);margin-top:8px;display:flex;align-items:center;gap:4px}
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <span id="logo">Agent X</span>
    <button id="new-chat-btn" onclick="newChat()">+ New Chat</button>
  </div>

  <div id="projects-section">
    <div class="section-header">
      <span>Projects</span>
      <button class="add-btn" onclick="newProject()" title="New project">+</button>
    </div>
    <div id="project-list"></div>
  </div>

  <div id="chats-section">
    <div id="chats-header">All Chats</div>
    <div id="chat-list"></div>
  </div>

  <div id="utility-bar">
    <a class="util-btn" href="/tasks.html"><span class="util-icon">&#9776;</span> Tasks</a>
    <a class="util-btn" href="/secrets.html"><span class="util-icon">&#128273;</span> Secrets</a>
    <button class="util-btn" onclick="openSettings()"><span class="util-icon">&#9881;</span> Settings</button>
  </div>

  <div id="sidebar-footer">
    <span id="auth-dot"></span>
    <span id="auth-label">checking...</span>
  </div>
</div>

<div id="main">
  <div id="messages">
    <div id="empty">
      <h2>SECRET AGENT X</h2>
      <p>Your personal AI agent. Start a conversation or pick one from the sidebar.</p>
    </div>
  </div>
  <div id="input-area">
    <div id="input-box">
      <textarea id="msg-input" placeholder="Message Agent X..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
      <button id="send-btn" onclick="sendMessage()">SEND</button>
    </div>
  </div>
</div>

<!-- Secret Request Modal -->
<div id="secret-modal-overlay">
  <div id="secret-modal">
    <h3>Secret Requested</h3>
    <div class="secret-service" id="secret-modal-service"></div>
    <div class="secret-name-badge" id="secret-modal-name"></div>
    <div class="secret-reason" id="secret-modal-reason"></div>
    <input type="password" id="secret-input" placeholder="Paste your secret here..." autocomplete="off" spellcheck="false"
      onkeydown="if(event.key==='Enter')submitSecret()"/>
    <div class="secret-warning">This value is encrypted and stored locally. It never appears in chat.</div>
    <div class="secret-modal-actions">
      <button id="secret-cancel" onclick="cancelSecret()">Cancel</button>
      <button id="secret-submit" onclick="submitSecret()">Save Secret</button>
    </div>
  </div>
</div>

<script>
const AUTH_TOKEN = new URLSearchParams(location.search).get('token') || localStorage.getItem('sax_token') || '';
if (AUTH_TOKEN) localStorage.setItem('sax_token', AUTH_TOKEN);
const API = '';

let chats = loadChats();
let projects = loadProjects();
let activeChat = null;
let streaming = false;

// ── Storage ──
function loadChats(){ try { return JSON.parse(localStorage.getItem('sax_chats_v2')||'[]'); } catch { return []; }}
function saveChats(){ localStorage.setItem('sax_chats_v2', JSON.stringify(chats)); }
function loadProjects(){ try { return JSON.parse(localStorage.getItem('sax_projects_v1')||'[]'); } catch { return []; }}
function saveProjects(){ localStorage.setItem('sax_projects_v1', JSON.stringify(projects)); }
function uid(){ return Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,7); }
function esc(s){ const d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML; }

// Basic markdown renderer
function md(s){
  if(!s) return '';
  let h=esc(s);
  // Code blocks
  h=h.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre style="background:#0d0d18;border:1px solid var(--border);border-radius:8px;padding:10px;overflow-x:auto;font-family:var(--mono);font-size:.82rem;margin:8px 0"><code>$2</code></pre>');
  // Inline code
  h=h.replace(/`([^`]+)`/g,'<code style="background:#1a1a30;padding:1px 5px;border-radius:4px;font-family:var(--mono);font-size:.85em">$1</code>');
  // Bold
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  // Italic
  h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');
  // Bullet lists
  h=h.replace(/^- (.+)$/gm,'<li style="margin-left:16px;list-style:disc">$1</li>');
  // Numbered lists
  h=h.replace(/^\d+\. (.+)$/gm,'<li style="margin-left:16px;list-style:decimal">$1</li>');
  // Headers
  h=h.replace(/^### (.+)$/gm,'<h4 style="color:var(--accent);margin:8px 0 4px;font-size:.9rem">$1</h4>');
  h=h.replace(/^## (.+)$/gm,'<h3 style="color:var(--accent);margin:10px 0 4px;font-size:1rem">$1</h3>');
  h=h.replace(/^# (.+)$/gm,'<h2 style="color:var(--accent);margin:12px 0 4px;font-size:1.1rem">$1</h2>');
  // URLs → clickable links (before line breaks)
  h=h.replace(/(https?:\/\/[^\s<"']+)/g,'<a href="$1" target="_blank" style="color:var(--accent);text-decoration:underline;cursor:pointer" onclick="event.stopPropagation()">$1</a>');
  // File paths → clickable (open in browser for html files)
  h=h.replace(/(?<!")(\b[\w./\\-]+\.html\b)/g,'<a href="$1" target="_blank" style="color:var(--accent);text-decoration:underline;cursor:pointer">$1</a>');
  // Line breaks
  h=h.replace(/\n/g,'<br>');
  return h;
}

// ── Auth ──
async function checkAuth(){
  try{
    const r=await fetch(`${API}/api/auth/status`,{headers:{Authorization:`Bearer ${AUTH_TOKEN}`}});
    const d=await r.json();
    document.getElementById('auth-dot').className=d.authenticated?'ok':'';
    document.getElementById('auth-label').textContent=d.authenticated?(d.method==='oauth'?'OAuth connected':'API key active'):'not connected';
  }catch{ document.getElementById('auth-label').textContent='offline'; }
}

let expandedProjects = new Set();
let openMoveMenu = null;

// Close move menu on outside click
document.addEventListener('click', ()=>{ if(openMoveMenu){openMoveMenu.remove();openMoveMenu=null;} });

// ── Projects ──
function newProject(){
  const name=prompt('Project name:');
  if(!name) return;
  const p={id:uid(),name,createdAt:Date.now()};
  projects.push(p);
  saveProjects();
  expandedProjects.add(p.id);
  renderSidebar();
}

function deleteProject(id,e){
  e.stopPropagation();
  if(!confirm('Delete this project? Chats will be moved to All Chats.')) return;
  // Unassign chats from this project
  chats.forEach(c=>{ if(c.projectId===id) c.projectId=null; });
  saveChats();
  projects=projects.filter(p=>p.id!==id);
  saveProjects();
  expandedProjects.delete(id);
  renderSidebar();
}

function toggleProject(id){
  if(expandedProjects.has(id)) expandedProjects.delete(id);
  else expandedProjects.add(id);
  renderSidebar();
}

function projectChatsCount(pid){
  return chats.filter(c=>c.projectId===pid).length;
}

function showMoveMenu(chatId,e){
  e.stopPropagation();
  if(openMoveMenu){openMoveMenu.remove();openMoveMenu=null;}
  const chat=chats.find(c=>c.id===chatId);
  if(!chat) return;
  const menu=document.createElement('div');
  menu.className='move-menu';
  // Option to remove from project
  if(chat.projectId){
    menu.innerHTML+=`<div class="move-menu-item remove" onclick="moveChat('${chatId}',null,event)">Remove from project</div>`;
  }
  // List all projects
  projects.forEach(p=>{
    if(p.id!==chat.projectId){
      menu.innerHTML+=`<div class="move-menu-item" onclick="moveChat('${chatId}','${p.id}',event)">${esc(p.name)}</div>`;
    }
  });
  if(projects.length===0 && !chat.projectId){
    menu.innerHTML='<div class="move-menu-item" style="color:var(--muted);cursor:default">No projects yet</div>';
  }
  e.currentTarget.closest('.chat-item').appendChild(menu);
  openMoveMenu=menu;
}

function moveChat(chatId,projectId,e){
  e.stopPropagation();
  const chat=chats.find(c=>c.id===chatId);
  if(!chat) return;
  chat.projectId=projectId||null;
  saveChats();
  if(projectId) expandedProjects.add(projectId);
  if(openMoveMenu){openMoveMenu.remove();openMoveMenu=null;}
  renderSidebar();
}

function renderProjects(){
  const el=document.getElementById('project-list');
  if(projects.length===0){
    el.innerHTML='<div style="padding:4px 12px;font-size:.72rem;color:var(--muted)">No projects yet</div>';
    return;
  }
  el.innerHTML=projects.map(p=>{
    const expanded=expandedProjects.has(p.id);
    const count=projectChatsCount(p.id);
    const pChats=chats.filter(c=>c.projectId===p.id);
    return `
      <div class="project-item ${expanded?'expanded':''}" onclick="toggleProject('${p.id}')">
        <span class="project-arrow">&#9654;</span>
        <span class="project-name">${esc(p.name)}</span>
        ${count?`<span class="project-count">${count}</span>`:''}
        <button class="project-delete" onclick="deleteProject('${p.id}',event)" title="Delete project">&times;</button>
      </div>
      <div class="project-chats">
        ${pChats.map(c=>`
          <div class="chat-item ${activeChat&&activeChat.id===c.id?'active':''}" onclick="selectChat('${c.id}')">
            <span class="chat-dot"></span>
            <span class="chat-title">${esc(c.title)}</span>
            <span class="chat-actions">
              <button class="chat-action-btn" onclick="showMoveMenu('${c.id}',event)" title="Move">&#8618;</button>
              <button class="chat-action-btn delete" onclick="deleteChat('${c.id}',event)" title="Delete">&times;</button>
            </span>
          </div>
        `).join('')}
        ${pChats.length===0?'<div style="padding:4px 8px;font-size:.7rem;color:var(--muted)">No chats yet</div>':''}
      </div>
    `;
  }).join('');
}

// ── Chats ──
function newChat(){
  activeChat={id:'chat-'+uid(),title:'New Chat',messages:[],createdAt:Date.now(),updatedAt:Date.now()};
  chats.unshift(activeChat);
  saveChats();
  renderSidebar();
  renderMessages();
}

function selectChat(id){
  activeChat=chats.find(c=>c.id===id)||null;
  renderSidebar();
  renderMessages();
}

function deleteChat(id,e){
  e.stopPropagation();
  if(!confirm('Delete this chat? This cannot be undone.')) return;
  chats=chats.filter(c=>c.id!==id);
  if(activeChat&&activeChat.id===id){activeChat=null;}
  saveChats();
  renderSidebar();
  renderMessages();
  fetch(`/api/sessions/${encodeURIComponent(id)}`,{method:'DELETE'}).catch(()=>{});
}

function renderChatList(){
  const el=document.getElementById('chat-list');
  const unassigned=chats.filter(c=>!c.projectId);
  el.innerHTML=unassigned.map(c=>`
    <div class="chat-item ${activeChat&&activeChat.id===c.id?'active':''}" onclick="selectChat('${c.id}')">
      <span class="chat-dot"></span>
      <span class="chat-title">${esc(c.title)}</span>
      <span class="chat-actions">
        ${projects.length?`<button class="chat-action-btn" onclick="showMoveMenu('${c.id}',event)" title="Move to project">&#8618;</button>`:''}
        <button class="chat-action-btn delete" onclick="deleteChat('${c.id}',event)" title="Delete">&times;</button>
      </span>
    </div>
  `).join('') || '<div style="padding:8px 12px;font-size:.72rem;color:var(--muted)">No chats yet. Click + New Chat to start.</div>';
}

function renderSidebar(){
  renderProjects();
  renderChatList();
}

function openSettings(){
  alert('Settings coming soon!');
}

function renderMessages(){
  const el=document.getElementById('messages');
  if(!activeChat||activeChat.messages.length===0){
    el.innerHTML=`<div id="empty"><h2>SECRET AGENT X</h2><p>${activeChat?'Start your conversation below.':'Select a chat or start a new one.'}</p></div>`;
    return;
  }
  el.innerHTML='';
  for(const msg of activeChat.messages){
    if(msg.role==='user') addMessageEl('user',msg.content);
    else if(msg.role==='assistant'&&msg.content) addMessageEl('assistant',msg.content);
  }
  el.scrollTop=el.scrollHeight;
}

// ── Send Message ──
async function sendMessage(){
  if(streaming) return;
  const input=document.getElementById('msg-input');
  const text=input.value.trim();
  if(!text) return;
  input.value='';
  input.style.height='auto';

  if(!activeChat) newChat();

  // Auto-title from first message
  if(activeChat.messages.length===0){
    activeChat.title=text.slice(0,50)+(text.length>50?'...':'');
    saveChats();
    renderSidebar();
  }

  // Clear empty state
  const empty=document.getElementById('empty');
  if(empty) empty.remove();

  addMessageEl('user',text);
  activeChat.messages.push({role:'user',content:text});

  const msgEl=addMessageEl('assistant','');
  const bodyEl=msgEl.querySelector('.msg-body');
  bodyEl.innerHTML='<div class="thinking"><span>.</span><span>.</span><span>.</span></div>';

  streaming=true;
  document.getElementById('send-btn').disabled=true;

  try{
    const res=await fetch(`${API}/api/chat`,{
      method:'POST',
      headers:{'Content-Type':'application/json',Authorization:`Bearer ${AUTH_TOKEN}`},
      body:JSON.stringify({message:text,sessionId:activeChat.id}),
    });

    const reader=res.body.getReader();
    const decoder=new TextDecoder();
    let buffer='',content='';

    while(true){
      const{done,value}=await reader.read();
      if(done) break;
      buffer+=decoder.decode(value,{stream:true});
      const lines=buffer.split('\n');
      buffer=lines.pop()||'';

      for(const line of lines){
        if(!line.startsWith('data: ')) continue;
        try{
          const event=JSON.parse(line.slice(6));
          switch(event.type){
            case 'stream':
              content+=event.delta;
              bodyEl.innerHTML=md(content);
              break;
            case 'tool_start':
              bodyEl.innerHTML=content?esc(content):'';
              bodyEl.appendChild(makeToolCard(event.toolName,event.args));
              break;
            case 'tool_end':{
              const cards=bodyEl.querySelectorAll('.tool-card');
              const last=cards[cards.length-1];
              if(last){
                const ind=last.querySelector('.indicator');
                ind.className='indicator '+(event.allowed?'allowed':'blocked');
                last.querySelector('.tool-detail').textContent=event.result.slice(0,2000);
              }
              break;
            }
            case 'secret_request':
              showSecretModal(event.name, event.service, event.reason);
              break;
            case 'error':
              content+='\n\nError: '+event.message;
              bodyEl.innerHTML=md(content);
              break;
          }
        }catch{}
      }
      document.getElementById('messages').scrollTop=document.getElementById('messages').scrollHeight;
    }

    // Only save non-empty responses
    if(content.trim()){
      activeChat.messages.push({role:'assistant',content});
      activeChat.updatedAt=Date.now();
      saveChats();
      renderSidebar();
    }
  }catch(e){
    bodyEl.textContent='Connection error: '+e.message;
    // Show retry button
    const retryBtn=document.createElement('button');
    retryBtn.textContent='Retry';
    retryBtn.style.cssText='margin-top:8px;padding:6px 16px;background:var(--accent);color:var(--bg);border:none;border-radius:6px;cursor:pointer;font-family:var(--mono);font-size:.8rem';
    retryBtn.onclick=()=>{document.getElementById('msg-input').value=msg;sendMessage()};
    bodyEl.appendChild(retryBtn);
  }

  streaming=false;
  document.getElementById('send-btn').disabled=false;
}

function addMessageEl(role,text){
  const el=document.getElementById('messages');
  const div=document.createElement('div');
  div.className='msg '+role;
  div.innerHTML=`
    <div class="msg-label">${role==='user'?'You':'Assistant'}</div>
    <div class="msg-body">${role==='assistant'?md(text):esc(text)}</div>
  `;
  el.appendChild(div);
  el.scrollTop=el.scrollHeight;
  return div;
}

function toolSummary(name,args){
  // Human-friendly one-liner for each tool
  switch(name){
    case 'browser': {
      const a=args.action||'';
      if(a==='navigate') return `Opening ${args.url||'page'}...`;
      if(a==='new_tab') return `New tab: ${args.url||'page'}...`;
      if(a==='snapshot') return 'Scanning page elements...';
      if(a==='fill') return args.ref?`Typing into element [${args.ref}]...`:`Typing into ${args.selector||'field'}...`;
      if(a==='click') return args.ref?`Clicking element [${args.ref}]...`:`Clicking ${args.selector||'element'}...`;
      if(a==='click_text') return `Clicking "${args.text||'element'}"...`;
      if(a==='screenshot') return 'Taking screenshot...';
      if(a==='extract') return 'Reading page content...';
      if(a==='evaluate') return 'Running script...';
      if(a==='close') return 'Closing browser...';
      if(a==='tabs') return 'Listing open tabs...';
      if(a==='switch_tab') return `Switching to tab ${args.value||''}...`;
      return `Browser: ${a}`;
    }
    case 'memory_search': return `Searching memory: "${(args.query||'').slice(0,40)}"`;
    case 'memory_save': return `Saving to ${args.target||'daily'} memory`;
    case 'memory_recall': return `Recalling ${args.entity||args.kind||'facts'}`;
    case 'memory_reflect': return 'Reflecting on recent conversations...';
    case 'memory_update_profile': return `Updating ${args.file||'profile'}`;
    case 'memory_get': return `Reading ${args.path||'memory file'}`;
    case 'memory_stats': return 'Checking memory stats';
    case 'read': return `Reading ${(args.path||'').split(/[/\\]/).pop()||'file'}`;
    case 'write': return `Writing ${(args.path||'').split(/[/\\]/).pop()||'file'}`;
    case 'edit': return `Editing ${(args.path||'').split(/[/\\]/).pop()||'file'}`;
    case 'bash': return `Running: ${(args.command||'').slice(0,50)}`;
    case 'http_request': return `${(args.method||'GET')} ${(args.url||'').slice(0,50)}`;
    default: return `${name} ${JSON.stringify(args).slice(0,60)}`;
  }
}
function makeToolCard(name,args){
  const card=document.createElement('div');
  card.className='tool-card';
  const summary=toolSummary(name,args);
  card.innerHTML=`
    <div class="tool-header" onclick="this.parentElement.classList.toggle('open')">
      <span class="indicator"></span>
      <span class="tool-name">${esc(name)}</span>
      <span style="color:var(--muted);font-size:.72rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${esc(summary)}</span>
      <span style="color:var(--muted);font-size:.65rem">▶</span>
    </div>
    <div class="tool-detail">executing...</div>
  `;
  return card;
}

// Auto-resize textarea
document.getElementById('msg-input').addEventListener('input',function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,160)+'px';
});

// ── Secret Modal ──
let pendingSecretName = '';

function showSecretModal(name, service, reason) {
  pendingSecretName = name;
  document.getElementById('secret-modal-name').textContent = name;
  document.getElementById('secret-modal-service').textContent = service ? `Service: ${service}` : '';
  document.getElementById('secret-modal-reason').textContent = reason;
  document.getElementById('secret-input').value = '';
  document.getElementById('secret-modal-overlay').classList.add('visible');
  setTimeout(() => document.getElementById('secret-input').focus(), 100);
}

async function submitSecret() {
  const input = document.getElementById('secret-input');
  const value = input.value.trim();
  if (!value) return;

  document.getElementById('secret-submit').disabled = true;

  try {
    await fetch(`${API}/api/secrets`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${AUTH_TOKEN}` },
      body: JSON.stringify({ name: pendingSecretName, value }),
    });
  } catch (e) {
    console.error('Failed to save secret:', e);
  }

  input.value = '';
  pendingSecretName = '';
  document.getElementById('secret-submit').disabled = false;
  document.getElementById('secret-modal-overlay').classList.remove('visible');
}

function cancelSecret() {
  document.getElementById('secret-input').value = '';
  pendingSecretName = '';
  document.getElementById('secret-modal-overlay').classList.remove('visible');
}

// Close modal on overlay click
document.getElementById('secret-modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) cancelSecret();
});

// ── Init ──
checkAuth();
renderSidebar();
renderMessages();
</script>
