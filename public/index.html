<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.14.0/dist/ort.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.7/dist/bundle.min.js"></script>
<title>Open Agent X</title>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #0f0f18;
  --border: #1a1a2e;
  --accent: #00ff41;
  --accent-dim: #00cc3388;
  --danger: #ff3333;
  --text: #c8d0e0;
  --muted: #555570;
  --user-bg: #0d1a2a;
  --agent-bg: #0f0f1a;
  --input-bg: #111122;
  --hover: #151528;
  --font: 'Segoe UI', system-ui, sans-serif;
  --mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}
body::after{content:'';position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,65,0.012) 2px,rgba(0,255,65,0.012) 4px);z-index:9999}

/* ── Sidebar ── */
#sidebar{width:280px;min-width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width .2s}
#sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
#logo{font-family:var(--mono);font-size:.85rem;color:var(--accent);letter-spacing:2px;text-transform:uppercase;text-shadow:0 0 10px var(--accent-dim);flex:1}
#new-chat-btn{background:transparent;border:1px solid var(--accent);color:var(--accent);border-radius:8px;padding:7px 12px;font-size:.75rem;cursor:pointer;font-family:var(--mono);transition:all .2s;white-space:nowrap}
#new-chat-btn:hover{background:var(--accent);color:var(--bg);box-shadow:0 0 12px var(--accent-dim)}

/* Projects */
#projects-section{padding:8px 0;border-bottom:1px solid var(--border)}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:0 12px;margin-bottom:4px}
.section-header span{font-size:.68rem;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.add-btn{background:none;border:none;color:var(--accent);cursor:pointer;font-size:.9rem;padding:2px 6px;border-radius:4px}
.add-btn:hover{background:var(--hover)}
.project-item{padding:6px 10px 6px 12px;cursor:pointer;font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:8px;transition:all .15s}
.project-item:hover{background:var(--hover);color:var(--text)}
.project-item.active{color:var(--accent)}
.project-arrow{font-size:.55rem;transition:transform .15s;width:10px;text-align:center;flex-shrink:0}
.project-item.expanded .project-arrow{transform:rotate(90deg)}
.project-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.project-count{font-size:.65rem;color:var(--muted);font-family:var(--mono)}
.project-delete{display:none;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.7rem;padding:2px 5px;border-radius:3px}
.project-item:hover .project-delete{display:block}
.project-delete:hover{color:var(--danger);background:#2a1010}
.project-chats{display:none;padding:2px 0 4px 20px}
.project-item.expanded+.project-chats{display:block}

/* Chat list */
#chats-section{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
#chats-header{padding:8px 12px 4px;font-size:.68rem;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:1px;flex-shrink:0}
#chat-list{flex:1;overflow-y:auto;padding:4px 8px;scrollbar-width:thin;scrollbar-color:#222 transparent}
.chat-item{padding:8px 10px;border-radius:8px;cursor:pointer;font-size:.78rem;color:var(--muted);transition:all .15s;margin-bottom:1px;display:flex;align-items:center;gap:8px;position:relative}
.chat-item:hover{background:var(--hover);color:var(--text)}
.chat-item.active{background:#1a1a30;color:var(--accent);border-left:2px solid var(--accent)}
.chat-dot{width:5px;height:5px;border-radius:50%;background:var(--accent-dim);flex-shrink:0}
.chat-item.active .chat-dot{background:var(--accent);box-shadow:0 0 6px var(--accent)}
.chat-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-actions{display:none;align-items:center;gap:2px}
.chat-item:hover .chat-actions{display:flex}
.chat-action-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.7rem;padding:2px 4px;border-radius:3px}
.chat-action-btn:hover{color:var(--text);background:var(--hover)}
.chat-action-btn.delete:hover{color:var(--danger);background:#2a1010}

/* Move-to-project dropdown */
.move-menu{position:absolute;right:0;top:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px;min-width:140px;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.5)}
.move-menu-item{padding:5px 10px;font-size:.72rem;color:var(--muted);cursor:pointer;border-radius:4px;font-family:var(--mono)}
.move-menu-item:hover{background:var(--hover);color:var(--text)}
.move-menu-item.remove{color:var(--danger)}

/* Utility bar */
#utility-bar{display:flex;border-top:1px solid var(--border);padding:6px 8px;gap:4px}
.util-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 4px;border-radius:8px;background:none;border:none;color:var(--muted);cursor:pointer;font-family:var(--mono);font-size:.68rem;text-decoration:none;transition:all .15s}
.util-btn:hover{background:var(--hover);color:var(--text)}
.util-btn .util-icon{font-size:.8rem}

#sidebar-footer{padding:10px 14px;border-top:1px solid var(--border);font-size:.68rem;font-family:var(--mono);display:flex;align-items:center;gap:6px}
#auth-dot{width:6px;height:6px;border-radius:50%;background:var(--danger)}
#auth-dot.ok{background:var(--accent);box-shadow:0 0 6px var(--accent-dim)}
#auth-label{color:var(--muted)}

/* ── Main ── */
#main{flex:1;display:flex;flex-direction:column;min-width:0}

/* Messages */
#messages{flex:1;overflow-y:auto;padding:24px 20px;display:flex;flex-direction:column;gap:16px;scrollbar-width:thin;scrollbar-color:#1a1a2e transparent}
.msg{max-width:800px;width:100%;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
.msg.user{align-self:flex-end}
.msg.assistant{align-self:flex-start}
.msg-label{font-size:.65rem;font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.msg.user .msg-label{color:#3388aa;text-align:right}
.msg.assistant .msg-label{color:var(--accent)}
.msg-body{padding:12px 16px;border-radius:12px;line-height:1.7;font-size:.9rem;white-space:pre-wrap;word-break:break-word}
.msg.user .msg-body{background:var(--user-bg);border:1px solid #1a2a40;border-radius:12px 12px 4px 12px}
.msg.assistant .msg-body{background:var(--agent-bg);border:1px solid var(--border);border-radius:12px 12px 12px 4px}

.tool-card{margin:8px 0;border-radius:8px;border:1px solid var(--border);overflow:hidden;font-size:.82rem}
.tool-header{padding:8px 12px;background:#111125;display:flex;align-items:center;gap:8px;cursor:pointer;font-family:var(--mono)}
.tool-header .indicator{width:8px;height:8px;border-radius:50%}
.tool-header .indicator.allowed{background:var(--accent);box-shadow:0 0 6px var(--accent-dim)}
.tool-header .indicator.blocked{background:var(--danger);box-shadow:0 0 6px rgba(255,51,51,.4)}
.tool-name{color:var(--accent)}
.tool-detail{display:none;padding:10px 12px;background:#0d0d18;font-family:var(--mono);font-size:.78rem;color:var(--muted);white-space:pre-wrap;max-height:200px;overflow-y:auto}
.tool-card.open .tool-detail{display:block}

.thinking{color:var(--muted);font-size:.85rem;padding:8px 0;font-family:var(--mono)}
.thinking span{animation:blink 1.2s infinite}
.thinking span:nth-child(2){animation-delay:.2s}
.thinking span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* Empty state */
#empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--muted)}
#empty h2{font-family:var(--mono);color:var(--accent);font-size:1.5rem;letter-spacing:3px;text-shadow:0 0 20px var(--accent-dim)}
#empty p{font-size:.85rem;max-width:400px;text-align:center;line-height:1.6}

/* Input area */
#input-area{padding:12px 20px 18px;border-top:1px solid var(--border)}
#input-box{background:var(--input-bg);border:1px solid var(--border);border-radius:14px;display:flex;align-items:flex-end;padding:10px 14px;transition:border-color .2s;max-width:800px;margin:0 auto;width:100%}
#input-box:focus-within{border-color:var(--accent);box-shadow:0 0 8px rgba(0,255,65,.1)}
#msg-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:.9rem;resize:none;max-height:160px;line-height:1.5;font-family:var(--font)}
#msg-input::placeholder{color:var(--muted)}
#upload-btn{background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-weight:700;padding:8px 12px;cursor:pointer;font-family:var(--mono);font-size:.8rem;margin-left:10px;transition:all .2s}
#upload-btn:hover{border-color:var(--accent);color:var(--accent);box-shadow:0 0 10px rgba(0,255,65,.1)}

/* Attachment preview strip */
#attachment-preview{display:none;padding:8px 14px 0;max-width:800px;margin:0 auto;width:100%;gap:8px;flex-wrap:wrap}
#attachment-preview .att-thumb{position:relative;width:64px;height:64px;border-radius:8px;border:1px solid var(--border);overflow:hidden;background:var(--surface)}
#attachment-preview .att-thumb img{width:100%;height:100%;object-fit:cover}
#attachment-preview .att-thumb .att-file{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:.6rem;color:var(--muted);font-family:var(--mono);text-align:center;padding:4px;word-break:break-all}
#attachment-preview .att-remove{position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:var(--danger);color:#fff;border:none;cursor:pointer;font-size:.65rem;display:flex;align-items:center;justify-content:center;line-height:1}

/* Chat image attachments */
.msg-attachments{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.msg-attachments img{max-width:240px;max-height:180px;border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:transform .15s;object-fit:cover}
.msg-attachments img:hover{transform:scale(1.03);border-color:var(--accent)}
.msg-attachments .att-file-badge{padding:6px 12px;border-radius:8px;background:var(--surface);border:1px solid var(--border);font-size:.75rem;font-family:var(--mono);color:var(--muted)}

/* Lightbox */
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);z-index:10001;align-items:center;justify-content:center;cursor:zoom-out}
#lightbox.visible{display:flex}
#lightbox img{max-width:90vw;max-height:90vh;border-radius:12px;box-shadow:0 0 40px rgba(0,0,0,.5)}
#send-btn{background:var(--accent);border:none;border-radius:8px;color:var(--bg);font-weight:700;padding:8px 18px;cursor:pointer;font-family:var(--mono);font-size:.8rem;margin-left:10px;transition:all .2s}
#send-btn:hover{box-shadow:0 0 14px var(--accent-dim)}
#send-btn:disabled{opacity:.3;cursor:not-allowed}

/* ── Voice ── */
#mic-btn{background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);padding:8px 12px;cursor:pointer;font-size:.9rem;margin-left:10px;transition:all .2s;position:relative}
#mic-btn:hover{border-color:var(--accent);color:var(--accent)}
#mic-btn.listening{background:rgba(255,51,51,.15);border-color:var(--danger);color:var(--danger);animation:pulse-mic 1.5s infinite}
#mic-btn.speaking{border-color:var(--accent);color:var(--accent);opacity:.7}
@keyframes pulse-mic{0%,100%{box-shadow:0 0 0 0 rgba(255,51,51,.3)}50%{box-shadow:0 0 12px 4px rgba(255,51,51,.2)}}
#voice-indicator{position:fixed;top:12px;right:12px;font-family:var(--mono);font-size:.68rem;padding:5px 10px;border-radius:6px;z-index:1000;display:none;letter-spacing:.5px}
#voice-indicator.listening{display:block;background:rgba(255,51,51,.15);color:var(--danger);border:1px solid var(--danger)}
#voice-indicator.speaking{display:block;background:rgba(0,255,65,.1);color:var(--accent);border:1px solid var(--accent)}
#tts-toggle{position:fixed;top:12px;right:140px;font-family:var(--mono);font-size:.65rem;padding:4px 8px;border-radius:5px;background:var(--surface);border:1px solid var(--border);color:var(--muted);cursor:pointer;z-index:1000;transition:all .15s}
#tts-toggle:hover{border-color:var(--accent);color:var(--accent)}
#tts-toggle.active{border-color:var(--accent);color:var(--accent);background:#0f1f0f}

/* ── Secret Request Modal ── */
#secret-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:10000;align-items:center;justify-content:center}
#secret-modal-overlay.visible{display:flex}
#secret-modal{background:var(--surface);border:1px solid var(--accent);border-radius:16px;padding:28px 32px;max-width:480px;width:90%;box-shadow:0 0 40px rgba(0,255,65,.15);animation:fadeIn .2s ease}
#secret-modal h3{font-family:var(--mono);color:var(--accent);font-size:.95rem;margin-bottom:6px;letter-spacing:1px}
#secret-modal .secret-reason{color:var(--muted);font-size:.82rem;margin-bottom:16px;line-height:1.5}
#secret-modal .secret-name-badge{display:inline-block;background:#1a1a30;border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-family:var(--mono);font-size:.78rem;color:var(--accent);margin-bottom:12px}
#secret-modal .secret-service{color:var(--muted);font-size:.72rem;font-family:var(--mono);margin-bottom:12px}
#secret-input{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:var(--mono);font-size:.85rem;outline:none;transition:border-color .2s}
#secret-input:focus{border-color:var(--accent);box-shadow:0 0 8px rgba(0,255,65,.1)}
#secret-input::placeholder{color:var(--muted)}
.secret-modal-actions{display:flex;gap:10px;margin-top:16px;justify-content:flex-end}
.secret-modal-actions button{font-family:var(--mono);font-size:.78rem;padding:8px 18px;border-radius:8px;cursor:pointer;transition:all .2s}
#secret-cancel{background:transparent;border:1px solid var(--border);color:var(--muted)}
#secret-cancel:hover{border-color:var(--danger);color:var(--danger)}
#secret-submit{background:var(--accent);border:none;color:var(--bg);font-weight:700}
#secret-submit:hover{box-shadow:0 0 14px var(--accent-dim)}
#secret-submit:disabled{opacity:.3;cursor:not-allowed}
.secret-warning{font-size:.7rem;color:var(--muted);margin-top:8px;display:flex;align-items:center;gap:4px}
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <span id="logo">Agent X</span>
    <button id="new-chat-btn" onclick="newChat()">+ New Chat</button>
  </div>

  <div id="projects-section">
    <div class="section-header">
      <span>Projects</span>
      <button class="add-btn" onclick="newProject()" title="New project">+</button>
    </div>
    <div id="project-list"></div>
  </div>

  <div id="chats-section">
    <div id="chats-header">All Chats</div>
    <div id="chat-list"></div>
  </div>

  <div id="utility-bar">
    <a class="util-btn" href="/tasks.html"><span class="util-icon">&#9776;</span> Tasks</a>
    <a class="util-btn" href="/secrets.html"><span class="util-icon">&#128273;</span> Secrets</a>
    <a class="util-btn" href="/settings.html" style="text-decoration:none"><span class="util-icon">&#9881;</span> Settings</a>
  </div>

  <div id="sidebar-footer">
    <span id="auth-dot"></span>
    <span id="auth-label">checking...</span>
  </div>
</div>

<div id="voice-indicator"></div>
<button id="tts-toggle" onclick="toggleTTS()" title="Toggle voice responses">VOICE OFF</button>

<div id="main">
  <div id="messages">
    <div id="empty">
      <h2>OPEN AGENT X</h2>
      <p>Your personal AI agent. Start a conversation or pick one from the sidebar.</p>
    </div>
  </div>
  <div id="input-area">
    <div id="attachment-preview"></div>
    <div id="input-box">
      <textarea id="msg-input" placeholder="Message Agent X..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
      <input id="file-input" type="file" multiple accept="image/*,.pdf,.txt,.json,.csv,.md,.doc,.docx" style="display:none" onchange="handleFileUpload(event)" />
      <button id="mic-btn" onclick="toggleMic()" title="Voice input (hold Space or click)">&#127908;</button>
      <button id="upload-btn" onclick="triggerUpload()">UPLOAD</button>
      <button id="send-btn" onclick="sendMessage()">SEND</button>
    </div>
  </div>
</div>

<!-- Lightbox for image zoom -->
<div id="lightbox" onclick="this.classList.remove('visible')">
  <img id="lightbox-img" src="" alt="Preview" />
</div>

<!-- Secret Request Modal -->
<div id="secret-modal-overlay">
  <div id="secret-modal">
    <h3>Secret Requested</h3>
    <div class="secret-service" id="secret-modal-service"></div>
    <div class="secret-name-badge" id="secret-modal-name"></div>
    <div class="secret-reason" id="secret-modal-reason"></div>
    <input type="password" id="secret-input" placeholder="Paste your secret here..." autocomplete="off" spellcheck="false"
      onkeydown="if(event.key==='Enter')submitSecret()"/>
    <div class="secret-warning">This value is encrypted and stored locally. It never appears in chat.</div>
    <div class="secret-modal-actions">
      <button id="secret-cancel" onclick="cancelSecret()">Cancel</button>
      <button id="secret-submit" onclick="submitSecret()">Save Secret</button>
    </div>
  </div>
</div>

<script>
// Token handling: prefer sessionStorage (dies with tab) over localStorage.
// URL param accepted ONCE for initial setup, then stripped from URL to prevent leakage.
let AUTH_TOKEN = localStorage.getItem('sax_token') || sessionStorage.getItem('sax_token') || '';
const urlToken = new URLSearchParams(location.search).get('token');
if (urlToken) {
  AUTH_TOKEN = urlToken;
  // Persist to localStorage so it survives tab closes and new sessions
  localStorage.setItem('sax_token', urlToken);
  sessionStorage.setItem('sax_token', urlToken);
  // Strip token from URL immediately (prevents leakage via referrer/history/screenshots)
  const cleanUrl = new URL(location.href);
  cleanUrl.searchParams.delete('token');
  history.replaceState(null, '', cleanUrl.pathname + cleanUrl.search + cleanUrl.hash);
}

// First-run setup: if no token, show instructions instead of silently failing
if (!AUTH_TOKEN) {
  document.addEventListener('DOMContentLoaded', () => {
    document.body.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0a0a0f;font-family:monospace;color:#00ff41">
        <div style="max-width:520px;text-align:center;padding:40px">
          <h1 style="font-size:1.6rem;margin-bottom:8px">OPEN AGENT X</h1>
          <p style="color:#666;margin-bottom:32px;font-size:.85rem">First-time setup required</p>
          <p style="color:#ccc;margin-bottom:16px;font-size:.9rem">Copy the URL printed in your terminal and open it in this browser:</p>
          <div style="background:#111;border:1px solid #00ff4133;border-radius:8px;padding:16px;font-size:.8rem;color:#00ff41;word-break:break-all;margin-bottom:24px">
            http://127.0.0.1:4800/?token=<span style="color:#f59e0b">&lt;your-token-from-terminal&gt;</span>
          </div>
          <p style="color:#555;font-size:.75rem">Or paste your token directly:</p>
          <div style="display:flex;gap:8px;margin-top:10px">
            <input id="token-input" type="text" placeholder="Paste token here..."
              style="flex:1;background:#111;border:1px solid #333;border-radius:6px;padding:10px;color:#fff;font-family:monospace;font-size:.8rem;outline:none" />
            <button onclick="
              const t=document.getElementById('token-input').value.trim();
              if(t){localStorage.setItem('sax_token',t);sessionStorage.setItem('sax_token',t);location.reload();}
            " style="background:#00ff41;color:#0a0a0f;border:none;border-radius:6px;padding:10px 18px;font-family:monospace;font-weight:700;cursor:pointer;font-size:.8rem">GO</button>
          </div>
        </div>
      </div>`;
  });
}
const API = '';

let chats = loadChats();
let projects = loadProjects();
let activeChat = null;
let streaming = false;
let pendingUploads = [];

// ── Storage ──
function loadChats(){ try { return JSON.parse(localStorage.getItem('sax_chats_v2')||'[]'); } catch { return []; }}
function saveChats(){
  // Keep only serializable fields (url is a small path, safe for localStorage)
  const toSave = chats.map(c => ({
    ...c,
    messages: c.messages.map(m => {
      if(!m.attachments) return m;
      return {...m, attachments: m.attachments.map(a => ({name:a.name, size:a.size, type:a.type, isImage:a.isImage, url:a.url}))};
    })
  }));
  localStorage.setItem('sax_chats_v2', JSON.stringify(toSave));
}
function loadProjects(){ try { return JSON.parse(localStorage.getItem('sax_projects_v1')||'[]'); } catch { return []; }}
function saveProjects(){ localStorage.setItem('sax_projects_v1', JSON.stringify(projects)); }
function uid(){ return Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,7); }
function esc(s){ const d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML.replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }

// Basic markdown renderer
function md(s){
  if(!s) return '';
  let h=esc(s);
  // Code blocks
  h=h.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre style="background:#0d0d18;border:1px solid var(--border);border-radius:8px;padding:10px;overflow-x:auto;font-family:var(--mono);font-size:.82rem;margin:8px 0"><code>$2</code></pre>');
  // Inline code
  h=h.replace(/`([^`]+)`/g,'<code style="background:#1a1a30;padding:1px 5px;border-radius:4px;font-family:var(--mono);font-size:.85em">$1</code>');
  // Bold
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  // Italic
  h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');
  // Bullet lists
  h=h.replace(/^- (.+)$/gm,'<li style="margin-left:16px;list-style:disc">$1</li>');
  // Numbered lists
  h=h.replace(/^\d+\. (.+)$/gm,'<li style="margin-left:16px;list-style:decimal">$1</li>');
  // Headers
  h=h.replace(/^### (.+)$/gm,'<h4 style="color:var(--accent);margin:8px 0 4px;font-size:.9rem">$1</h4>');
  h=h.replace(/^## (.+)$/gm,'<h3 style="color:var(--accent);margin:10px 0 4px;font-size:1rem">$1</h3>');
  h=h.replace(/^# (.+)$/gm,'<h2 style="color:var(--accent);margin:12px 0 4px;font-size:1.1rem">$1</h2>');
  // URLs → clickable links (before line breaks)
  // Use a placeholder to prevent double-matching
  const urlPlaceholders=[];
  h=h.replace(/(https?:\/\/[^\s<"']+)/g,(match)=>{
    const idx=urlPlaceholders.length;
    urlPlaceholders.push('<a href="'+match+'" target="_blank" style="color:var(--accent);text-decoration:underline;cursor:pointer" onclick="event.stopPropagation()">'+match+'</a>');
    return '%%URL'+idx+'%%';
  });
  // Restore URL placeholders (after all other replacements to prevent double-matching)
  // Done after line breaks below
  // Line breaks
  h=h.replace(/\n/g,'<br>');
  // Restore URL placeholders last (prevents other regexes from corrupting links)
  for(let i=0;i<urlPlaceholders.length;i++){
    h=h.replace('%%URL'+i+'%%',urlPlaceholders[i]);
  }
  return h;
}

async function checkAuth(){

let expandedProjects = new Set();
let openMoveMenu = null;

// Close move menu on outside click
document.addEventListener('click', ()=>{ if(openMoveMenu){openMoveMenu.remove();openMoveMenu=null;} });

// ── Projects ──
function newProject(){
  const name=prompt('Project name:');
  if(!name) return;
  const p={id:uid(),name,createdAt:Date.now()};
  projects.push(p);
  saveProjects();
  expandedProjects.add(p.id);
  renderSidebar();
}

function deleteProject(id,e){
  e.stopPropagation();
  if(!confirm('Delete this project? Chats will be moved to All Chats.')) return;
  // Unassign chats from this project
  chats.forEach(c=>{ if(c.projectId===id) c.projectId=null; });
  saveChats();
  projects=projects.filter(p=>p.id!==id);
  saveProjects();
  expandedProjects.delete(id);
  renderSidebar();
}

function toggleProject(id){
  if(expandedProjects.has(id)) expandedProjects.delete(id);
  else expandedProjects.add(id);
  renderSidebar();
}

function projectChatsCount(pid){
  return chats.filter(c=>c.projectId===pid).length;
}

function showMoveMenu(chatId,e){
  e.stopPropagation();
  if(openMoveMenu){openMoveMenu.remove();openMoveMenu=null;}
  const chat=chats.find(c=>c.id===chatId);
  if(!chat) return;
  const menu=document.createElement('div');
  menu.className='move-menu';
  // Option to remove from project
  if(chat.projectId){
    menu.innerHTML+=`<div class="move-menu-item remove" onclick="moveChat('${chatId}',null,event)">Remove from project</div>`;
  }
  // List all projects
  projects.forEach(p=>{
    if(p.id!==chat.projectId){
      menu.innerHTML+=`<div class="move-menu-item" onclick="moveChat('${chatId}','${p.id}',event)">${esc(p.name)}</div>`;
    }
  });
  if(projects.length===0 && !chat.projectId){
    menu.innerHTML='<div class="move-menu-item" style="color:var(--muted);cursor:default">No projects yet</div>';
  }
  e.currentTarget.closest('.chat-item').appendChild(menu);
  openMoveMenu=menu;
}

function moveChat(chatId,projectId,e){
  e.stopPropagation();
  const chat=chats.find(c=>c.id===chatId);
  if(!chat) return;
  chat.projectId=projectId||null;
  saveChats();
  if(projectId) expandedProjects.add(projectId);
  if(openMoveMenu){openMoveMenu.remove();openMoveMenu=null;}
  renderSidebar();
}

function renderProjects(){
  const el=document.getElementById('project-list');
  if(projects.length===0){
    el.innerHTML='<div style="padding:4px 12px;font-size:.72rem;color:var(--muted)">No projects yet</div>';
    return;
  }
  el.innerHTML=projects.map(p=>{
    const expanded=expandedProjects.has(p.id);
    const count=projectChatsCount(p.id);
    const pChats=chats.filter(c=>c.projectId===p.id);
    return `
      <div class="project-item ${expanded?'expanded':''}" onclick="toggleProject('${p.id}')">
        <span class="project-arrow">&#9654;</span>
        <span class="project-name">${esc(p.name)}</span>
        ${count?`<span class="project-count">${count}</span>`:''}
        <button class="project-delete" onclick="deleteProject('${p.id}',event)" title="Delete project">&times;</button>
      </div>
      <div class="project-chats">
        ${pChats.map(c=>`
          <div class="chat-item ${activeChat&&activeChat.id===c.id?'active':''}" onclick="selectChat('${c.id}')">
            <span class="chat-dot"></span>
            <span class="chat-title">${esc(c.title)}</span>
            <span class="chat-actions">
              <button class="chat-action-btn" onclick="showMoveMenu('${c.id}',event)" title="Move">&#8618;</button>
              <button class="chat-action-btn delete" onclick="deleteChat('${c.id}',event)" title="Delete">&times;</button>
            </span>
          </div>
        `).join('')}
        ${pChats.length===0?'<div style="padding:4px 8px;font-size:.7rem;color:var(--muted)">No chats yet</div>':''}
      </div>
    `;
  }).join('');
}

function selectChat(id){

function deleteChat(id,e){

  saveChats();
  renderSidebar();
  renderMessages();
  fetch(`/api/sessions/${encodeURIComponent(id)}`,{method:'DELETE'}).catch(()=>{});

async function refreshAuthStatus(){
  const el=document.getElementById('settings-auth-status');
  const btn=document.getElementById('btn-oauth-login');
  try{
    const r=await fetch(`${API}/api/auth/status`,{headers:{Authorization:`Bearer ${AUTH_TOKEN}`}});

    const discBtn=document.getElementById('btn-oauth-disconnect');
    if(d.authenticated){
      el.innerHTML=`<span style="color:var(--accent)">● Connected</span> — ${d.method==='oauth'?'OpenAI OAuth':'API Key'}`;
      btn.textContent='✓ ALREADY CONNECTED';
      btn.style.opacity='.5';
      if(d.method==='oauth' && discBtn) discBtn.style.display='block';
    } else {
      el.innerHTML='<span style="color:var(--danger)">● Not connected</span>';
      btn.textContent='🔑 SIGN IN WITH OPENAI';
      btn.style.opacity='1';
      if(discBtn) discBtn.style.display='none';
    }
  }catch{
    el.textContent='Could not reach server';
  }
}

async function triggerOAuthDisconnect(){
  const btn=document.getElementById('btn-oauth-disconnect');
  btn.textContent='⏳ DISCONNECTING...';
  btn.disabled=true;
  try{
    const r=await fetch(`${API}/api/auth/logout`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
    });
    const d=await r.json();
    if(d.ok){
      btn.textContent='✓ DISCONNECTED';
      btn.style.display='none';
      refreshAuthStatus();
      checkAuth();
    }
  }catch(e){
    btn.textContent='✗ ERROR';
  }
  btn.disabled=false;
}

async function triggerOAuthLogin(){
  const btn=document.getElementById('btn-oauth-login');
  btn.textContent='⏳ STARTING LOGIN...';
  btn.disabled=true;
  btn.style.opacity='.6';
  try{
    const r=await fetch(`${API}/api/auth/login`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
    });
    const d=await r.json();
    console.log('[settings] auth/login response:', r.status, d);
    if(d.ok && d.authUrl){
      // Open OpenAI login in a new tab
      window.open(d.authUrl, '_blank');
      btn.textContent='⏳ COMPLETE LOGIN IN BROWSER TAB...';
      // Poll auth status until connected
      let attempts=0;
      const poll=setInterval(async()=>{
        attempts++;
        try{
          const sr=await fetch(`${API}/api/auth/status`,{headers:{Authorization:`Bearer ${AUTH_TOKEN}`}});
          const sd=await sr.json();
          if(sd.authenticated){
            clearInterval(poll);
            btn.textContent='✓ LOGIN SUCCESSFUL';
            btn.style.borderColor='var(--accent)';
            btn.style.color='var(--accent)';
            btn.disabled=false;
            refreshAuthStatus();
            checkAuth();
          }
        }catch{}
        if(attempts>150){ // ~5 min at 2s intervals
          clearInterval(poll);
          btn.textContent='⏱ TIMED OUT — TRY AGAIN';
          btn.disabled=false;
          btn.style.opacity='1';
        }
      },2000);
    } else {
      btn.textContent='✗ FAILED — TRY AGAIN';
      btn.style.borderColor='var(--danger)';
      btn.style.color='var(--danger)';
      btn.disabled=false;
    }
  }catch(e){
    btn.textContent='✗ ERROR — TRY AGAIN';
    btn.style.borderColor='var(--danger)';
    btn.style.color='var(--danger)';
    btn.disabled=false;
  }
}

async function startAiServer(type){
  const el=document.getElementById('ai-status');
  const script=type==='image'?'workspace/sd-server/server.py':'workspace/sd-server/video-server.py';
  el.innerHTML=`<span style="color:#f59e0b">⏳ Starting ${type} server...</span> (first run downloads ~4GB model)`;

  try{
    // Use the agent's bash tool via chat API to start the server
    const r=await fetch(`${API}/api/chat`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${AUTH_TOKEN}`},
      body:JSON.stringify({
        message:`Use bash tool to run this exact command: Start-Process python -ArgumentList "${script}" -WindowStyle Normal`,
        sessionId:'system-setup'
      })
    });

    // Poll for server to be ready
    const port=type==='image'?7860:7861;
    let ready=false;
    for(let i=0;i<60;i++){
      await new Promise(r=>setTimeout(r,5000));
      try{
        const h=await fetch(`http://127.0.0.1:${port}/health`,{signal:AbortSignal.timeout(2000)});
        const d=await h.json();
        if(d.model_loaded){ready=true;break;}
        el.innerHTML=`<span style="color:#f59e0b">⏳ Loading ${type} model to GPU... (${(i+1)*5}s)</span>`;
      }catch{
        el.innerHTML=`<span style="color:#f59e0b">⏳ Starting ${type} server... (${(i+1)*5}s)</span>`;
      }
    }
    if(ready){
      el.innerHTML=`<span style="color:var(--accent)">● ${type} server ready!</span>`;
    }else{
      el.innerHTML=`<span style="color:var(--danger)">● ${type} server timed out</span> — try starting manually: python ${script}`;
    }
  }catch(e){
    el.innerHTML=`<span style="color:var(--danger)">● Failed: ${esc(e.message)}</span>`;
  }
}

// ── Send Message ──
async function sendMessage(){
  if(streaming) return;
  const input=document.getElementById('msg-input');
  const text=input.value.trim();
  if(!text && pendingUploads.length===0) return;

  // Capture attachments before clearing — use server URL for persistence
  const msgAttachments = pendingUploads.length ? pendingUploads.map(f => ({
    name: f.name, size: f.size, type: f.type, isImage: f.isImage,
    url: f.url || f.localUrl || null
  })) : null;
  const uploadPrefix = msgAttachments
    ? `Attached files:\n${msgAttachments.map(f=>`- ${f.name} (${f.size} bytes)`).join('\n')}\n\n`
    : '';
  const finalText = uploadPrefix + text;
  const displayText = text || '';

  input.value='';
  input.style.height='auto';
  clearAttachments();

  if(!activeChat) newChat();

  // Auto-title from first message
  if(activeChat.messages.length===0){
    const titleSource = text || (msgAttachments ? msgAttachments[0].name : 'New Chat');
    activeChat.title=titleSource.slice(0,50)+(titleSource.length>50?'...':'');
    saveChats();
    renderSidebar();
  }

  // Clear empty state
  const empty=document.getElementById('empty');
  if(empty) empty.remove();

  addMessageEl('user', displayText, msgAttachments);
  activeChat.messages.push({role:'user', content:finalText, attachments:msgAttachments});

  const msgEl=addMessageEl('assistant','');
  const bodyEl=msgEl.querySelector('.msg-body');
  bodyEl.innerHTML='<div class="thinking"><span>.</span><span>.</span><span>.</span></div>';

  streaming=true;
  stopSpeaking(); // Stop any ongoing TTS from previous response
  ttsSentenceBuffer = '';
  document.getElementById('send-btn').disabled=true;

  try{
    const res=await fetch(`${API}/api/chat`,{
      method:'POST',
      headers:{'Content-Type':'application/json',Authorization:`Bearer ${AUTH_TOKEN}`},
      body:JSON.stringify({message:finalText,sessionId:activeChat.id}),
    });

    const reader=res.body.getReader();
    const decoder=new TextDecoder();
    let buffer='',content='';

    while(true){
      const{done,value}=await reader.read();
      if(done) break;
      buffer+=decoder.decode(value,{stream:true});
      const lines=buffer.split('\n');
      buffer=lines.pop()||'';

      for(const line of lines){
        if(!line.startsWith('data: ')) continue;
        try{
          const event=JSON.parse(line.slice(6));
          switch(event.type){
            case 'stream':
              content+=event.delta;
              bodyEl.innerHTML=md(content);
              // Feed to TTS sentence-by-sentence as text arrives
              feedTTS(event.delta);
              break;
            case 'tool_start':
              bodyEl.innerHTML=content?esc(content):'';
              bodyEl.appendChild(makeToolCard(event.toolName,event.args));
              break;
            case 'tool_end':{
              const cards=bodyEl.querySelectorAll('.tool-card');
              const last=cards[cards.length-1];
              if(last){
                const ind=last.querySelector('.indicator');
                ind.className='indicator '+(event.allowed?'allowed':'blocked');
                last.querySelector('.tool-detail').textContent=event.result.slice(0,2000);
              }
              break;
            }
            case 'secret_request':
              showSecretModal(event.name, event.service, event.reason);
              break;
            case 'error':
              content+='\n\nError: '+event.message;
              bodyEl.innerHTML=md(content);
              break;
          }
        }catch{}
      }
      document.getElementById('messages').scrollTop=document.getElementById('messages').scrollHeight;
    }

    // Only save non-empty responses
    if(content.trim()){
      activeChat.messages.push({role:'assistant',content});
      activeChat.updatedAt=Date.now();
      saveChats();
      renderSidebar();
    }
  }catch(e){
    bodyEl.textContent='Connection error: '+e.message;
    // Show retry button
    const retryBtn=document.createElement('button');
    retryBtn.textContent='Retry';
    retryBtn.style.cssText='margin-top:8px;padding:6px 16px;background:var(--accent);color:var(--bg);border:none;border-radius:6px;cursor:pointer;font-family:var(--mono);font-size:.8rem';
    retryBtn.onclick=()=>{document.getElementById('msg-input').value=msg;sendMessage()};
    bodyEl.appendChild(retryBtn);
  }

  // Flush any remaining TTS buffer
  flushTTS();

  streaming=false;
  document.getElementById('send-btn').disabled=false;
}

function triggerUpload(){
  const fileInput = document.getElementById('file-input');
  if(fileInput) fileInput.click();
}

async function handleFileUpload(event){
  const files = Array.from(event.target.files || []);
  for(const f of files){
    // Create local preview immediately
    const localUrl = URL.createObjectURL(f);
    const entry = {
      name: f.name,
      size: f.size,
      type: f.type || 'unknown',
      localUrl,
      url: null,
      isImage: f.type.startsWith('image/'),
      file: f
    };
    pendingUploads.push(entry);
    renderAttachmentPreview();

    // Upload to server in background
    const form = new FormData();
    form.append('file', f);
    try{
      const res = await fetch('/api/upload', {
        method: 'POST',
        headers: { Authorization: `Bearer ${AUTH_TOKEN}` },
        body: form
      });
      const data = await res.json();
      if(data.files && data.files[0]){
        entry.url = data.files[0].url;
      }
    }catch(e){ console.warn('Upload failed:', e); }
  }
}

function renderAttachmentPreview(){
  const el = document.getElementById('attachment-preview');
  if(pendingUploads.length === 0){
    el.style.display = 'none';
    el.innerHTML = '';
    document.getElementById('upload-btn').textContent = 'UPLOAD';
    return;
  }
  el.style.display = 'flex';
  document.getElementById('upload-btn').textContent = `UPLOAD (${pendingUploads.length})`;
  el.innerHTML = pendingUploads.map((f, i) => `
    <div class="att-thumb">
      ${f.isImage
        ? `<img src="${f.localUrl || f.url || ''}" alt="${esc(f.name)}" />`
        : `<div class="att-file">${esc(f.name)}</div>`}
      <button class="att-remove" onclick="removeAttachment(${i})">&times;</button>
    </div>
  `).join('');
}

function removeAttachment(idx){
  pendingUploads.splice(idx, 1);
  renderAttachmentPreview();
}

function clearAttachments(){
  pendingUploads = [];
  renderAttachmentPreview();
  const fileInput = document.getElementById('file-input');
  if(fileInput) fileInput.value = '';
}

function openLightbox(src){
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('visible');
}

// Paste images from clipboard (Ctrl+V screenshots)
document.getElementById('msg-input').addEventListener('paste', (e) => {
  const items = Array.from(e.clipboardData?.items || []);
  const imageItems = items.filter(i => i.type.startsWith('image/'));
  if(imageItems.length === 0) return;
  e.preventDefault();
  imageItems.forEach(async item => {
    const file = item.getAsFile();
    if(!file) return;
    const localUrl = URL.createObjectURL(file);
    const entry = {
      name: `screenshot-${Date.now()}.png`,
      size: file.size,
      type: file.type,
      localUrl,
      url: null,
      isImage: true,
      file
    };
    pendingUploads.push(entry);
    renderAttachmentPreview();
    // Upload to server
    const form = new FormData();
    form.append('file', file, entry.name);
    try{
      const res = await fetch('/api/upload', {
        method: 'POST',
        headers: { Authorization: `Bearer ${AUTH_TOKEN}` },
        body: form
      });
      const data = await res.json();
      if(data.files && data.files[0]) entry.url = data.files[0].url;
    }catch(e){ console.warn('Upload failed:', e); }
  });
});

function addMessageEl(role,text,attachments){
  const el=document.getElementById('messages');
  const div=document.createElement('div');
  div.className='msg '+role;

  let attachHtml = '';
  if(attachments && attachments.length){
    attachHtml = '<div class="msg-attachments">' + attachments.map(a => {
      if(a.isImage && a.url){
        return `<img src="${a.url}" alt="${esc(a.name)}" onclick="openLightbox(this.src)" title="${esc(a.name)}" />`;
      } else if(a.isImage){
        return `<div class="att-file-badge" style="display:flex;align-items:center;gap:6px"><span style="font-size:1.1rem">&#128444;</span> ${esc(a.name)}</div>`;
      } else {
        return `<div class="att-file-badge">${esc(a.name)} (${(a.size/1024).toFixed(1)}KB)</div>`;
      }
    }).join('') + '</div>';
  }

  const bodyContent = role==='assistant' ? md(text) : esc(text);
  div.innerHTML=`
    <div class="msg-label">${role==='user'?'You':'Assistant'}</div>
    <div class="msg-body">${attachHtml}${bodyContent}</div>
  `;
  el.appendChild(div);
  el.scrollTop=el.scrollHeight;
  return div;
}

function toolSummary(name,args){
  // Human-friendly one-liner for each tool
  switch(name){
    case 'browser': {
      const a=args.action||'';
      if(a==='navigate') return `Opening ${args.url||'page'}...`;
      if(a==='new_tab') return `New tab: ${args.url||'page'}...`;
      if(a==='snapshot') return 'Scanning page elements...';
      if(a==='fill') return args.ref?`Typing into element [${args.ref}]...`:`Typing into ${args.selector||'field'}...`;
      if(a==='click') return args.ref?`Clicking element [${args.ref}]...`:`Clicking ${args.selector||'element'}...`;
      if(a==='click_text') return `Clicking "${args.text||'element'}"...`;
      if(a==='screenshot') return 'Taking screenshot...';
      if(a==='extract') return 'Reading page content...';
      if(a==='evaluate') return 'Running script...';
      if(a==='close') return 'Closing browser...';
      if(a==='tabs') return 'Listing open tabs...';
      if(a==='switch_tab') return `Switching to tab ${args.value||''}...`;
      return `Browser: ${a}`;
    }
    case 'memory_search': return `Searching memory: "${(args.query||'').slice(0,40)}"`;
    case 'memory_save': return `Saving to ${args.target||'daily'} memory`;
    case 'memory_recall': return `Recalling ${args.entity||args.kind||'facts'}`;
    case 'memory_reflect': return 'Reflecting on recent conversations...';
    case 'memory_update_profile': return `Updating ${args.file||'profile'}`;
    case 'memory_get': return `Reading ${args.path||'memory file'}`;
    case 'memory_stats': return 'Checking memory stats';
    case 'read': return `Reading ${(args.path||'').split(/[/\\]/).pop()||'file'}`;
    case 'write': return `Writing ${(args.path||'').split(/[/\\]/).pop()||'file'}`;
    case 'edit': return `Editing ${(args.path||'').split(/[/\\]/).pop()||'file'}`;
    case 'bash': return `Running: ${(args.command||'').slice(0,50)}`;
    case 'http_request': return `${(args.method||'GET')} ${(args.url||'').slice(0,50)}`;
    default: return `${name} ${JSON.stringify(args).slice(0,60)}`;
  }
}
function makeToolCard(name,args){
  const card=document.createElement('div');
  card.className='tool-card';
  const summary=toolSummary(name,args);
  card.innerHTML=`
    <div class="tool-header" onclick="this.parentElement.classList.toggle('open')">
      <span class="indicator"></span>
      <span class="tool-name">${esc(name)}</span>
      <span style="color:var(--muted);font-size:.72rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${esc(summary)}</span>
      <span style="color:var(--muted);font-size:.65rem">▶</span>
    </div>
    <div class="tool-detail">executing...</div>
  `;
  return card;
}

  document.getElementById('secret-modal-name').textContent = name;
  document.getElementById('secret-modal-service').textContent = service ? `Service: ${service}` : '';

async function submitSecret() {
  const input = document.getElementById('secret-input');
  const value = input.value.trim();
  if (!value) return;

  document.getElementById('secret-submit').disabled = true;

  try {
    await fetch(`${API}/api/secrets`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${AUTH_TOKEN}` },
      body: JSON.stringify({ name: pendingSecretName, value }),
    });

document.getElementById('secret-modal-overlay').addEventListener('click', function(e) {

});

// ── Voice System v2: Always-On with VAD ──
// VAD (Voice Activity Detection) auto-detects when you talk — no button needed.
// Whisper transcribes locally. Kokoro speaks responses. All free, all local.

let voiceEnabled = false;
let voiceMode = false; // true = always-listening mode active
let isListening = false;
let isSpeaking = false;
let vadInstance = null;
let audioContext = null;
let ttsQueue = [];
let ttsSentenceBuffer = '';
let currentAudioSource = null;

// ── Toggle voice mode (always-on vs off) ──

async function toggleMic() {
  if (voiceMode) {
    stopVoiceMode();
  } else {
    await startVoiceMode();
  }
}

async function startVoiceMode() {
  stopSpeaking();

  try {
    // Initialize VAD — auto-detects speech start/end
    vadInstance = await vad.MicVAD.new({
      positiveSpeechThreshold: 0.8,
      negativeSpeechThreshold: 0.3,
      minSpeechFrames: 5,
      preSpeechPadFrames: 10,
      redemptionFrames: 15,

      onSpeechStart() {
        console.log('[voice] Speech detected');
        isListening = true;
        stopSpeaking(); // Interrupt TTS when user starts talking
        updateVoiceUI();
      },

      onSpeechEnd(audio) {
        console.log('[voice] Speech ended, transcribing...');
        isListening = false;
        updateVoiceUI('transcribing');
        transcribeAndSend(audio);
      },
    });

    vadInstance.start();
    voiceMode = true;
    voiceEnabled = true; // Auto-enable TTS in voice mode
    document.getElementById('tts-toggle').textContent = 'VOICE ON';
    document.getElementById('tts-toggle').className = 'active';
    updateVoiceUI();
    console.log('[voice] Always-on voice mode started');
  } catch (e) {
    console.error('[voice] VAD init failed:', e);
    // Fallback to push-to-talk
    alert('Voice mode failed to start. Check microphone permissions.');
  }
}

function stopVoiceMode() {
  voiceMode = false;
  isListening = false;
  if (vadInstance) {
    vadInstance.pause();
    vadInstance = null;
  }
  stopSpeaking();
  updateVoiceUI();
  console.log('[voice] Voice mode stopped');
}

// ── Transcribe speech and auto-send ──

async function transcribeAndSend(audioFloat32) {
  try {
    // Convert Float32 audio from VAD to WAV for Whisper
    const wavBlob = float32ToWav(audioFloat32, 16000);
    const arrayBuf = await wavBlob.arrayBuffer();

    const res = await fetch(`${API}/api/voice/transcribe`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${AUTH_TOKEN}` },
      body: new Uint8Array(arrayBuf),
    });
    const data = await res.json();

    if (data.text && data.text.trim()) {
      // Show transcription briefly then send
      const input = document.getElementById('msg-input');
      input.value = data.text.trim();
      sendMessage();
    }
  } catch (e) {
    console.error('[voice] Transcription failed:', e);
  }
  updateVoiceUI();
}

// Convert Float32 PCM (from VAD) → WAV blob for Whisper
function float32ToWav(samples, sampleRate) {
  const pcm16 = new Int16Array(samples.length);
  for (let i = 0; i < samples.length; i++) {
    pcm16[i] = Math.max(-32768, Math.min(32767, Math.round(samples[i] * 32767)));
  }

  const wavHeader = new ArrayBuffer(44);
  const view = new DataView(wavHeader);
  const dataSize = pcm16.length * 2;

  writeStr(view, 0, 'RIFF');
  view.setUint32(4, 36 + dataSize, true);
  writeStr(view, 8, 'WAVE');
  writeStr(view, 12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, 1, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  writeStr(view, 36, 'data');
  view.setUint32(40, dataSize, true);

  return new Blob([wavHeader, pcm16.buffer], { type: 'audio/wav' });
}

// REMOVED: webmToWav — replaced by float32ToWav (VAD outputs Float32 directly)

function writeStr(view, offset, str) {
  for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
}

// ── TTS: Sentence → server → Kokoro → audio playback ──

function toggleTTS() {
  voiceEnabled = !voiceEnabled;
  const btn = document.getElementById('tts-toggle');
  btn.textContent = voiceEnabled ? 'VOICE ON' : 'VOICE OFF';
  btn.className = voiceEnabled ? 'active' : '';
  if (!voiceEnabled) stopSpeaking();
}

async function speakSentence(text) {
  if (!voiceEnabled || !text.trim()) return;

  isSpeaking = true;
  updateVoiceUI();

  try {
    const res = await fetch(`${API}/api/voice/synthesize`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${AUTH_TOKEN}`,
      },
      body: JSON.stringify({ text: text.trim() }),
    });

    if (!res.ok) throw new Error(`TTS failed: ${res.status}`);

    const wavBuf = await res.arrayBuffer();
    if (wavBuf.byteLength < 100) throw new Error('Empty audio');

    // Play the WAV
    if (!audioContext) audioContext = new AudioContext({ sampleRate: 16000 });
    const audioBuf = await audioContext.decodeAudioData(wavBuf);
    const source = audioContext.createBufferSource();
    source.buffer = audioBuf;
    source.connect(audioContext.destination);
    currentAudioSource = source;

    await new Promise((resolve) => {
      source.onended = resolve;
      source.start();
    });

    currentAudioSource = null;
  } catch (e) {
    console.warn('[voice] TTS playback error:', e);
  }

  // Play next in queue
  if (ttsQueue.length > 0) {
    await speakSentence(ttsQueue.shift());
  } else {
    isSpeaking = false;
    updateVoiceUI();
  }
}

function feedTTS(delta) {
  if (!voiceEnabled) return;

  ttsSentenceBuffer += delta;

  const sentenceEnd = /[.!?]\s+|[.!?]$/;
  while (sentenceEnd.test(ttsSentenceBuffer)) {
    const match = ttsSentenceBuffer.match(sentenceEnd);
    const idx = match.index + match[0].length;
    const sentence = ttsSentenceBuffer.slice(0, idx).trim();
    ttsSentenceBuffer = ttsSentenceBuffer.slice(idx);

    if (sentence.length > 3) {
      if (isSpeaking) {
        ttsQueue.push(sentence);
      } else {
        speakSentence(sentence);
      }
    }
  }
}

function flushTTS() {
  if (voiceEnabled && ttsSentenceBuffer.trim().length > 3) {
    if (isSpeaking) {
      ttsQueue.push(ttsSentenceBuffer.trim());
    } else {
      speakSentence(ttsSentenceBuffer.trim());
    }
  }
  ttsSentenceBuffer = '';
}

function stopSpeaking() {
  if (currentAudioSource) {
    try { currentAudioSource.stop(); } catch {}
    currentAudioSource = null;
  }
  ttsQueue = [];
  ttsSentenceBuffer = '';
  isSpeaking = false;
  updateVoiceUI();
}

// ── Voice UI ──

function updateVoiceUI(state) {
  const micBtn = document.getElementById('mic-btn');
  const indicator = document.getElementById('voice-indicator');

  if (state === 'transcribing') {
    micBtn.className = 'listening';
    indicator.className = 'listening';
    indicator.textContent = '⚡ TRANSCRIBING...';
    return;
  }

  if (voiceMode) {
    micBtn.className = isListening ? 'listening' : isSpeaking ? 'speaking' : 'listening';
    micBtn.title = 'Voice mode ON (click to stop)';

    if (isListening) {
      indicator.className = 'listening';
      indicator.textContent = '🎙 LISTENING...';
    } else if (isSpeaking) {
      indicator.className = 'speaking';
      indicator.textContent = '🔊 SPEAKING...';
    } else {
      indicator.className = 'listening';
      indicator.textContent = '🎙 VOICE MODE';
    }
  } else {
    micBtn.className = '';
    micBtn.title = 'Click to enable voice mode (hands-free)';
    indicator.className = '';
  }
}

// Spacebar hold-to-talk (only when input not focused)
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && document.activeElement !== document.getElementById('msg-input')) {
    e.preventDefault();
    if (!isListening) startListening();
  }
});
document.addEventListener('keyup', (e) => {
  if (e.code === 'Space' && isListening && document.activeElement !== document.getElementById('msg-input')) {
    e.preventDefault();
    stopListening();
  }
});

// Escape to stop TTS
document.addEventListener('keydown', (e) => {
  if (e.code === 'Escape') { stopSpeaking(); }
});

renderSidebar();
renderMessages();
