<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws://localhost:* ws://127.0.0.1:* wss://localhost:* wss://127.0.0.1:*; img-src 'self' data: https:; font-src 'self';">
<title>Local Agent X — Task Dashboard</title>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #0f0f18;
  --surface-2: #131325;
  --border: #1a1a2e;
  --accent: #00ff41;
  --accent-dim: #00cc3388;
  --danger: #ff3333;
  --warn: #ffaa00;
  --info: #33aaff;
  --text: #c8d0e0;
  --muted: #666680;
  --font: 'Segoe UI', system-ui, sans-serif;
  --mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: grid;
  grid-template-columns: 340px 1fr;
  overflow: hidden;
}

/* Left panel */
#left {
  border-right: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  min-width: 0;
}
#brand {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
#brand h1 {
  font-size: 0.9rem;
  letter-spacing: 2px;
  font-family: var(--mono);
  color: var(--accent);
  text-transform: uppercase;
}
#auth-label { color: var(--muted); font-size: 0.75rem; }

#quick-add {
  padding: 12px;
  border-bottom: 1px solid var(--border);
}
#quick-add textarea {
  width: 100%;
  background: #111122;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 10px;
  min-height: 70px;
  resize: vertical;
}
.row { display: flex; gap: 8px; margin-top: 8px; }
select, input[type="date"], input[type="text"] {
  background: #111122;
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 8px;
  font-size: 0.82rem;
}
button {
  background: transparent;
  color: var(--accent);
  border: 1px solid var(--accent);
  border-radius: 8px;
  padding: 8px 10px;
  cursor: pointer;
  font-family: var(--mono);
  font-size: 0.76rem;
}
button:hover { background: var(--accent); color: #001107; }

#filters {
  padding: 12px;
  border-bottom: 1px solid var(--border);
}
#task-list {
  flex: 1;
  overflow: auto;
  padding: 10px;
}
.task-item {
  border: 1px solid var(--border);
  border-radius: 10px;
  background: #101020;
  padding: 10px;
  margin-bottom: 8px;
  cursor: pointer;
}
.task-item.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent-dim) inset; }
.task-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.badge { font-size: 0.68rem; padding: 2px 6px; border-radius: 999px; font-family: var(--mono); }
.p1 { background: #3a1111; color: #ff8080; }
.p2 { background: #3a2a11; color: #ffd080; }
.p3 { background: #102a3a; color: #80ccff; }
.status { background: #1c1c30; color: #aab; }
.task-title { font-size: 0.86rem; line-height: 1.35; color: #d8e1ef; }
.task-meta { margin-top: 6px; color: var(--muted); font-size: 0.72rem; }

/* Right panel */
#right { display: flex; flex-direction: column; min-width: 0; }
#toolbar {
  height: 48px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  font-family: var(--mono);
  font-size: 0.8rem;
  color: var(--muted);
}
#editor { flex: 1; overflow: auto; padding: 14px; }
.panel {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
}
.grid { display: grid; gap: 10px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
.grid .full { grid-column: 1 / -1; }
label { font-size: 0.72rem; color: var(--muted); display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .8px; }
textarea {
  width: 100%;
  background: #0f0f1c;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 9px;
  min-height: 86px;
  resize: vertical;
}
#agentPrompt { min-height: 130px; }
#notes { min-height: 120px; }
#chat {
  margin-top: 10px;
  border-top: 1px solid var(--border);
  padding-top: 10px;
}
#chatLog {
  background: #0e0e17;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  height: 180px;
  overflow: auto;
  white-space: pre-wrap;
  font-size: 0.82rem;
}
.small { font-size: 0.75rem; color: var(--muted); }
.hidden { display: none; }
</style>
</head>
<body>
  <section id="left">
    <div id="brand">
      <h1>Agent Task Board</h1>
      <div id="auth-label">checking auth...</div>
    </div>

    <div id="quick-add">
      <textarea id="newTitle" placeholder="Quick add task..."></textarea>
      <div class="row">
        <select id="newPriority">
          <option value="P1">P1</option><option value="P2" selected>P2</option><option value="P3">P3</option>
        </select>
        <select id="newStatus">
          <option>Todo</option><option>Doing</option><option>Blocked</option><option>Done</option>
        </select>
        <input id="newDue" type="date"/>
        <button onclick="createTask()">+ Add</button>
      </div>
    </div>

    <div id="filters">
      <div class="row">
        <input id="search" type="text" placeholder="Search tasks..." oninput="renderTasks()" style="flex:1"/>
      </div>
      <div class="row">
        <select id="filterStatus" onchange="renderTasks()">
          <option value="">All status</option><option>Todo</option><option>Doing</option><option>Blocked</option><option>Done</option>
        </select>
        <select id="filterPriority" onchange="renderTasks()">
          <option value="">All priority</option><option>P1</option><option>P2</option><option>P3</option>
        </select>
      </div>
    </div>

    <div id="task-list"></div>
  </section>

  <section id="right">
    <div id="toolbar">
      <span id="taskHeader">Select a task</span>
      <div>
        <button id="deleteBtn" class="hidden" onclick="deleteTask()" style="border-color:var(--danger);color:var(--danger)">Delete</button>
      </div>
    </div>
    <div id="editor">
      <div id="empty" class="panel small">No task selected. Create one on the left, then use <b>Send to Agent</b> to run it.</div>
      <div id="details" class="panel hidden">
        <div class="grid">
          <div>
            <label>Title</label>
            <textarea id="title"></textarea>
          </div>
          <div>
            <label>Tags (comma separated)</label>
            <input id="tags" type="text"/>
          </div>
          <div>
            <label>Priority</label>
            <select id="priority"><option>P1</option><option>P2</option><option>P3</option></select>
          </div>
          <div>
            <label>Status</label>
            <select id="status"><option>Todo</option><option>Doing</option><option>Blocked</option><option>Done</option></select>
          </div>
          <div>
            <label>Due Date</label>
            <input id="dueDate" type="date"/>
          </div>
          <div>
            <label>Session ID</label>
            <input id="sessionId" type="text" placeholder="agent-session"/>
          </div>
          <div class="full">
            <label>For Agent (clear instruction)</label>
            <textarea id="agentPrompt" placeholder="Example: Refactor auth.ts to separate token parsing and validation..."></textarea>
          </div>
          <div class="full">
            <label>Notes / Output</label>
            <textarea id="notes" placeholder="Store decisions and results here..."></textarea>
          </div>
        </div>
        <div class="row" style="margin-top:10px">
          <button onclick="saveTask()">Save</button>
          <button onclick="sendToAgent()">Send to Agent</button>
        </div>
        <div id="chat">
          <div class="small" style="margin-bottom:6px">Agent Response Stream</div>
          <div id="chatLog"></div>
        </div>
      </div>
    </div>
  </section>

<script>
let AUTH_TOKEN = sessionStorage.getItem('sax_token') || localStorage.getItem('sax_token') || '';
const urlToken = new URLSearchParams(location.search).get('token');
if (urlToken) {
  AUTH_TOKEN = urlToken;
  sessionStorage.setItem('sax_token', urlToken);
  const cleanUrl = new URL(location.href);
  cleanUrl.searchParams.delete('token');
  history.replaceState(null, '', cleanUrl.pathname + cleanUrl.search + cleanUrl.hash);
} else if (AUTH_TOKEN) {
  sessionStorage.setItem('sax_token', AUTH_TOKEN);
}
const API = '';

let tasks = loadTasks();
let selectedId = null;

function loadTasks(){
  try { return JSON.parse(localStorage.getItem('sax_tasks_v1') || '[]'); }
  catch { return []; }
}
function persist(){ localStorage.setItem('sax_tasks_v1', JSON.stringify(tasks)); }
function uid(){ return 'task-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,7); }
function esc(s){ const d=document.createElement('div'); d.textContent=String(s||''); return d.innerHTML.replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }

async function checkAuth(){
  try {
    const r = await fetch(`${API}/api/auth/status`, { headers:{ Authorization:`Bearer ${AUTH_TOKEN}` }});
    const d = await r.json();
    document.getElementById('auth-label').textContent = d.authenticated ? `auth: ${d.method}` : 'auth: none';
  } catch {
    document.getElementById('auth-label').textContent = 'auth: offline';
  }
}

function createTask(){
  const title = document.getElementById('newTitle').value.trim();
  if(!title) return;
  const t = {
    id: uid(),
    title,
    priority: document.getElementById('newPriority').value,
    status: document.getElementById('newStatus').value,
    dueDate: document.getElementById('newDue').value || '',
    tags: [],
    agentPrompt: '',
    notes: '',
    sessionId: 'mission-' + Date.now().toString(36),
    createdAt: Date.now(),
    updatedAt: Date.now(),
  };
  tasks.unshift(t);
  document.getElementById('newTitle').value='';
  persist();
  renderTasks();
  selectTask(t.id);
}

function filteredTasks(){
  const q = document.getElementById('search').value.toLowerCase().trim();
  const fs = document.getElementById('filterStatus').value;
  const fp = document.getElementById('filterPriority').value;
  return tasks
    .filter(t => !fs || t.status===fs)
    .filter(t => !fp || t.priority===fp)
    .filter(t => !q || [t.title,t.agentPrompt,t.notes,(t.tags||[]).join(' ')].join(' ').toLowerCase().includes(q))
    .sort((a,b)=>b.updatedAt-a.updatedAt);
}

function renderTasks(){
  const list = document.getElementById('task-list');
  const rows = filteredTasks().map(t=>`
    <div class="task-item ${t.id===selectedId?'active':''}" onclick="selectTask('${esc(t.id)}')">
      <div class="task-top">
        <span class="badge ${esc(t.priority.toLowerCase())}">${t.priority}</span>
        <span class="badge status">${esc(t.status)}</span>
      </div>
      <div class="task-title">${esc(t.title)}</div>
      <div class="task-meta">${t.dueDate ? 'Due: '+esc(t.dueDate)+' · ' : ''}Updated ${new Date(t.updatedAt).toLocaleString()}</div>
    </div>`).join('');
  list.innerHTML = rows || `<div class="small" style="padding:10px">No tasks yet.</div>`;
}

function selectTask(id){
  selectedId = id;
  const t = tasks.find(x=>x.id===id);
  if(!t) return;
  document.getElementById('empty').classList.add('hidden');
  document.getElementById('details').classList.remove('hidden');
  document.getElementById('deleteBtn').classList.remove('hidden');
  document.getElementById('taskHeader').textContent = `Task: ${t.title.slice(0,80)}`;

  document.getElementById('title').value = t.title || '';
  document.getElementById('tags').value = (t.tags||[]).join(', ');
  document.getElementById('priority').value = t.priority || 'P2';
  document.getElementById('status').value = t.status || 'Todo';
  document.getElementById('dueDate').value = t.dueDate || '';
  document.getElementById('sessionId').value = t.sessionId || '';
  document.getElementById('agentPrompt').value = t.agentPrompt || '';
  document.getElementById('notes').value = t.notes || '';
  document.getElementById('chatLog').textContent = '';
  renderTasks();
}

function saveTask(){
  const t = tasks.find(x=>x.id===selectedId);
  if(!t) return;
  t.title = document.getElementById('title').value.trim();
  t.tags = document.getElementById('tags').value.split(',').map(x=>x.trim()).filter(Boolean);
  t.priority = document.getElementById('priority').value;
  t.status = document.getElementById('status').value;
  t.dueDate = document.getElementById('dueDate').value;
  t.sessionId = document.getElementById('sessionId').value.trim() || ('mission-' + Date.now().toString(36));
  t.agentPrompt = document.getElementById('agentPrompt').value.trim();
  t.notes = document.getElementById('notes').value;
  t.updatedAt = Date.now();
  persist();
  renderTasks();
  document.getElementById('taskHeader').textContent = `Task: ${t.title.slice(0,80)}`;
}

function deleteTask(){
  if(!selectedId) return;
  tasks = tasks.filter(t=>t.id!==selectedId);
  selectedId = null;
  persist();
  renderTasks();
  document.getElementById('details').classList.add('hidden');
  document.getElementById('deleteBtn').classList.add('hidden');
  document.getElementById('empty').classList.remove('hidden');
  document.getElementById('taskHeader').textContent = 'Select a task';
}

async function sendToAgent(){
  saveTask();
  const t = tasks.find(x=>x.id===selectedId);
  if(!t || !t.agentPrompt) return;
  const log = document.getElementById('chatLog');
  log.textContent = 'Sending...\n';

  try {
    const res = await fetch(`${API}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type':'application/json', Authorization:`Bearer ${AUTH_TOKEN}` },
      body: JSON.stringify({ message: t.agentPrompt, sessionId: t.sessionId || 'default' }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer='';
    let content='';

    while(true){
      const {done,value} = await reader.read();
      if(done) break;
      buffer += decoder.decode(value, {stream:true});
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for(const line of lines){
        if(!line.startsWith('data: ')) continue;
        try {
          const event = JSON.parse(line.slice(6));
          if(event.type==='stream') content += event.delta;
          else if(event.type==='tool_start') content += `\n\n[tool] ${event.toolName} ${JSON.stringify(event.args)}\n`;
          else if(event.type==='tool_end') content += `\n[tool-result] ${event.allowed?'allowed':'blocked'}\n`;
          else if(event.type==='error') content += `\n[error] ${event.message}\n`;
          log.textContent = content;
          log.scrollTop = log.scrollHeight;
        } catch {}
      }
    }

    t.notes = ((t.notes||'') + '\n\n--- Agent Run ' + new Date().toLocaleString() + ' ---\n' + content).trim();
    t.updatedAt = Date.now();
    persist();
    document.getElementById('notes').value = t.notes;
    renderTasks();
  } catch(e){
    log.textContent += '\nConnection error: ' + e.message;
  }
}

checkAuth();
renderTasks();
</script>
</body>
</html>
