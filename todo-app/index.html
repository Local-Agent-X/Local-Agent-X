<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <h1>Todo App</h1>

    <form id="todo-form" class="todo-form">
      <input id="todo-input" type="text" placeholder="Add a task..." autocomplete="off" required />
      <button type="submit">Add</button>
    </form>

    <div class="controls">
      <button data-filter="all" class="filter active">All</button>
      <button data-filter="active" class="filter">Active</button>
      <button data-filter="completed" class="filter">Completed</button>
      <button id="clear-completed" class="clear">Clear Completed</button>
    </div>

    <ul id="todo-list" class="todo-list"></ul>
    <p id="count" class="count">0 items left</p>
  </main>

  <script src="app.js"></script>
</body>
</html>
