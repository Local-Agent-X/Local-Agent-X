<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lakers Todo V3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell" id="app-shell">
    <header class="team-banner">
      <div class="brand-row">
        <div class="logo-badge" aria-hidden="true">LA</div>
        <div>
          <p class="conference">Lakers Productivity League</p>
          <h1>Championship Todo Board</h1>
          <p class="sub">Discipline wins rings.</p>
        </div>
      </div>
      <div class="score-strip">
        <div><span>Total</span><strong id="total-count">0</strong></div>
        <div><span>Completed</span><strong id="completed-count">0</strong></div>
        <div><span>Due Today</span><strong id="due-today-count">0</strong></div>
        <div><span>Win %</span><strong id="win-rate">0%</strong></div>
      </div>
    </header>

    <section class="input-card">
      <form id="todo-form" autocomplete="off">
        <input id="todo-input" type="text" placeholder="Add your next play..." maxlength="120" required />

        <select id="category-select" aria-label="Task category">
          <option value="Offense">Offense</option>
          <option value="Defense">Defense</option>
          <option value="Recovery">Recovery</option>
        </select>

        <select id="priority-select" aria-label="Task priority">
          <option value="Low">Low</option>
          <option value="Medium" selected>Medium</option>
          <option value="High">High</option>
        </select>

        <input id="due-date" type="date" aria-label="Due date" />

        <button type="submit">Add Play</button>
      </form>

      <div class="toolbar">
        <div class="filters" id="filters">
          <button class="filter active" data-filter="All">All</button>
          <button class="filter" data-filter="Offense">Offense</button>
          <button class="filter" data-filter="Defense">Defense</button>
          <button class="filter" data-filter="Recovery">Recovery</button>
          <button class="filter" data-filter="DueSoon">Due Soon</button>
        </div>

        <div class="toggles">
          <label class="mode-toggle"><input type="checkbox" id="playoff-toggle" /> <span>Playoff Mode</span></label>
          <label class="mode-toggle"><input type="checkbox" id="sound-toggle" /> <span>Sound FX</span></label>
          <button id="notify-btn" type="button" class="ghost">Enable Alerts</button>
        </div>
      </div>

      <div class="toolbar second">
        <button id="clear-completed" type="button" class="ghost">Clear Completed</button>
        <button id="mark-all-complete" type="button" class="ghost">Mark All Complete</button>
        <button id="delete-all" type="button" class="danger">Delete All</button>
        <button id="export-btn" type="button" class="ghost">Export JSON</button>
        <label class="import-label ghost">
          Import JSON
          <input id="import-input" type="file" accept="application/json" hidden />
        </label>
      </div>
    </section>

    <section class="board-card">
      <div class="board-head">
        <h2>Game Plan</h2>
        <p class="hint">Drag tasks to reprioritize.</p>
      </div>
      <ul id="todo-list" class="todo-list" aria-live="polite"></ul>
      <p id="empty-state" class="empty">No plays yet — add one and run the floor.</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
