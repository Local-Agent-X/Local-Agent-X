<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Groom Time</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>My Groom Time</h1>
      <p>Mobile Dog Grooming SaaS MVP (Local Build)</p>
    </div>
    <div class="topbar-actions">
      <button id="seedDemoBtn" class="ghost">Load Demo Data</button>
      <button id="clearBtn" class="danger">Clear Data</button>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <button class="nav-btn active" data-view="dashboard">Dashboard</button>
      <button class="nav-btn" data-view="appointments">Appointments</button>
      <button class="nav-btn" data-view="customers">Customers & Pets</button>
      <button class="nav-btn" data-view="services">Services & Pricing</button>
      <button class="nav-btn" data-view="invoices">Invoices</button>
    </aside>

    <section class="content">
      <div id="dashboard" class="view active">
        <div class="cards" id="kpiCards"></div>
        <div class="panel">
          <h2>Today’s Route</h2>
          <div id="todayRoute"></div>
        </div>
      </div>

      <div id="appointments" class="view">
        <div class="panel">
          <h2>New Appointment</h2>
          <form id="appointmentForm" class="grid-form">
            <label>Date <input type="date" name="date" required /></label>
            <label>Time <input type="time" name="time" required /></label>
            <label>Customer
              <select name="customerId" id="appointmentCustomerSelect" required></select>
            </label>
            <label>Pet
              <select name="petId" id="appointmentPetSelect" required></select>
            </label>
            <label>Address <input type="text" name="address" placeholder="123 Main St" required /></label>
            <label>Service
              <select name="serviceId" id="appointmentServiceSelect" required></select>
            </label>
            <label>Status
              <select name="status">
                <option>Scheduled</option>
                <option>En Route</option>
                <option>Grooming</option>
                <option>Done</option>
                <option>Cancelled</option>
              </select>
            </label>
            <label>Notes <input type="text" name="notes" placeholder="Temperament / special handling" /></label>
            <button type="submit">Add Appointment</button>
          </form>
        </div>
        <div class="panel">
          <h2>All Appointments</h2>
          <div id="appointmentsList"></div>
        </div>
      </div>

      <div id="customers" class="view">
        <div class="panel">
          <h2>New Customer & Pet</h2>
          <form id="customerForm" class="grid-form">
            <label>Customer Name <input name="customerName" required /></label>
            <label>Phone <input name="phone" required /></label>
            <label>Email <input name="email" type="email" /></label>
            <label>Pet Name <input name="petName" required /></label>
            <label>Breed <input name="breed" /></label>
            <label>Weight (lbs) <input name="weight" type="number" min="1" /></label>
            <label>Behavior Notes <input name="behaviorNotes" /></label>
            <button type="submit">Save Customer & Pet</button>
          </form>
        </div>
        <div class="panel">
          <h2>Customer List</h2>
          <div id="customersList"></div>
        </div>
      </div>

      <div id="services" class="view">
        <div class="panel">
          <h2>Add Service</h2>
          <form id="serviceForm" class="grid-form">
            <label>Service Name <input name="name" required /></label>
            <label>Duration (mins) <input name="duration" type="number" min="15" required /></label>
            <label>Base Price ($) <input name="price" type="number" min="1" step="0.01" required /></label>
            <button type="submit">Add Service</button>
          </form>
        </div>
        <div class="panel">
          <h2>Service Catalog</h2>
          <div id="servicesList"></div>
        </div>
      </div>

      <div id="invoices" class="view">
        <div class="panel">
          <h2>Create Invoice</h2>
          <form id="invoiceForm" class="grid-form">
            <label>Appointment
              <select name="appointmentId" id="invoiceAppointmentSelect" required></select>
            </label>
            <label>Amount Paid ($)
              <input name="amountPaid" type="number" min="0" step="0.01" required />
            </label>
            <label>Payment Method
              <select name="paymentMethod" required>
                <option>Cash</option>
                <option>Card</option>
                <option>Zelle</option>
                <option>Venmo</option>
                <option>Other</option>
              </select>
            </label>
            <label>Notes <input name="notes" /></label>
            <button type="submit">Save Invoice</button>
          </form>
        </div>
        <div class="panel">
          <h2>Invoice History</h2>
          <div id="invoicesList"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
