<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detroit Pistons Todo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="logo-ring">
        <span class="logo-text">DP</span>
      </div>
      <div>
        <h1>Detroit Pistons Todo</h1>
        <p>Handle business. Motor City style.</p>
      </div>
    </header>

    <main class="todo-card">
      <form id="todo-form" class="todo-form">
        <input id="todo-input" type="text" placeholder="Add a task..." maxlength="120" required />
        <button type="submit">Add Task</button>
      </form>

      <section class="controls">
        <div class="filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="active">Active</button>
          <button class="filter-btn" data-filter="completed">Completed</button>
        </div>
        <p id="task-count">0 tasks</p>
      </section>

      <ul id="todo-list" class="todo-list"></ul>

      <footer class="card-footer">
        <button id="clear-completed" class="clear-btn">Clear Completed</button>
      </footer>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
